<!DOCTYPE html>
<html lang="bn">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99V1DXBKKT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-99V1DXBKKT');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Avia TV - Live TV & Sports</title>

  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <link href="https://unpkg.com/videojs-mobile-ui/dist/videojs-mobile-ui.css" rel="stylesheet">

  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --focus: #00e5ff; --accent: #ff4081; --star: #ffd700; 
    }

    body { margin: 0; padding: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #222; }
    .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
    .video-js { width: 100% !important; height: 100% !important; }

    /* Gesture Overlay */
    .gesture-indicator {
      position: absolute; top: 50%; transform: translateY(-50%);
      padding: 10px 15px; background: rgba(0,0,0,0.8); border-radius: 20px;
      display: none; pointer-events: none; z-index: 2000; font-size: 12px; color: var(--primary); border: 1px solid var(--primary);
    }
    #brightness-status { left: 20px; }
    #volume-status { right: 20px; }

    header { padding: 8px 12px; background: #111; }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .brand-title { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; line-height: 1; }
    
    #recent-list { flex: 1; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .recent-item { min-width: 32px; height: 32px; background: var(--card); border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .recent-item img { width: 70%; height: 70%; object-fit: contain; }

    .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    #search { flex: 1; background:#1a1a1a; border:1px solid #333; color:white; padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; }
    #count { font-size: 10px; color: var(--primary); background: rgba(0,229,255,0.1); padding: 4px 8px; border-radius: 4px; white-space: nowrap; }

    .tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
    .tab-btn { padding: 6px 12px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 6px; font-size: 11px; white-space: nowrap; cursor: pointer; }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    #ticker { background: #001a1a; color: #fff; padding: 4px 0; font-size: 10px; overflow: hidden; }
    .ticker-content { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    #content-area { padding-top: 10px; }
    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; padding: 12px; }
    
    /* Active Channel Focus Style */
    .channel-card { background: var(--card); border-radius: 12px; padding: 12px 6px; text-align: center; border: 1.5px solid transparent; position: relative; cursor: pointer; transition: 0.3s; }
    .channel-card.active-playing { border-color: var(--primary); background: rgba(0, 229, 255, 0.1); transform: scale(1.05); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
    
    .fav-star { position: absolute; top: 5px; right: 5px; font-size: 16px; color: rgba(255,255,255,0.2); }
    .fav-star.active { color: var(--star); }
    .channel-logo { width: 45px; height: 35px; object-fit: contain; margin-bottom: 6px; }
    .channel-name { font-size: 10px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #brightness-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 9999; opacity: 0; }
  </style>
</head>
<body>

<div id="brightness-overlay"></div>

<div id="top-section">
  <div class="video-container" id="player-wrapper">
    <video id="my-video" class="video-js vjs-big-play-centered" controls playsinline preload="auto"></video>
    <div id="brightness-status" class="gesture-indicator">☀️ 100%</div>
    <div id="volume-status" class="gesture-indicator">🔊 100%</div>
  </div>

  <div id="ticker">
    <div class="ticker-content">
      <span id="now-playing-text" style="color: var(--primary); font-weight: bold;">চ্যানেল নির্বাচন করুন...</span>
      <span style="margin-left: 25px;">📢 আমাদের টেলিগ্রাম: @TECHBD_GROUP</span>
    </div>
  </div>

  <header>
    <div class="header-top">
      <div class="brand-title">AVIA TV</div>
      <div id="recent-list"></div>
    </div>
    <div class="search-row">
      <input type="text" id="search" placeholder="চ্যানেলের নাম লিখুন (যেমন: T Sports)..." oninput="doSearch()">
      <span id="count">0 CH</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
      <button class="tab-btn" onclick="filterCat('sports', this)">Sports</button>
      <button class="tab-btn" onclick="filterCat('bangla', this)">Bangla</button>
      <button class="tab-btn" onclick="filterCat('fav', this)" style="color:var(--star)">★ Fav</button>
    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://unpkg.com/videojs-mobile-ui/dist/videojs-mobile-ui.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let recentChannels = JSON.parse(localStorage.getItem('recentCh')) || [];
let player = videojs('my-video', { fluid: true });
player.mobileUi();

// Gesture Control (Volume/Brightness)
const playerWrapper = document.getElementById('player-wrapper');
let touchStartY;
let isRightSide = false;

playerWrapper.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    isRightSide = e.touches[0].clientX > (window.innerWidth / 2);
});

playerWrapper.addEventListener('touchmove', e => {
    const diffY = touchStartY - e.touches[0].clientY;
    if (isRightSide) {
        let v = Math.max(0, Math.min(1, player.volume() + (diffY * 0.005)));
        player.volume(v);
        showIndicator('volume-status', `🔊 ${Math.round(v * 100)}%`);
    } else {
        let o = Math.max(0, Math.min(0.85, (parseFloat(document.getElementById('brightness-overlay').style.opacity) || 0) - (diffY * 0.005)));
        document.getElementById('brightness-overlay').style.opacity = o;
        showIndicator('brightness-status', `☀️ ${Math.round((1 - o) * 100)}%`);
    }
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
}, { passive: false });

function showIndicator(id, text) {
    const el = document.getElementById(id);
    el.innerText = text; el.style.display = 'block';
    clearTimeout(el.timer);
    el.timer = setTimeout(() => el.style.display = 'none', 600);
}

// App Functions
async function init() {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    render(allChannels);
    renderRecent();
    adjustLayout();
    if(allChannels.length > 0) playChannel(allChannels[0].url, allChannels[0].name, allChannels[0].logo, false);
}

function parseM3U(data) {
    const list = [];
    let cur = {};
    data.split("\n").forEach(l => {
        if (l.startsWith("#EXTINF")) {
            cur.name = l.split(",")[1]?.trim();
            cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1] || "";
            cur.cat = (l.match(/group-title="([^"]+)"/)?.[1] || "").toLowerCase();
            cur.id = btoa(unescape(encodeURIComponent(cur.name)));
        } else if (l.startsWith("http")) { cur.url = l.trim(); list.push({...cur}); cur = {}; }
    });
    return list;
}

function render(list) {
    const grid = document.getElementById("channelList");
    grid.innerHTML = list.map(ch => `
        <div class="channel-card" id="ch-${ch.id}" onclick="playChannel('${ch.url}', '${ch.name}', '${ch.logo}', true, '${ch.id}')">
            <span class="fav-star ${favorites.includes(ch.id) ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
            <img src="${ch.logo}" class="channel-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/50?text=TV'">
            <div class="channel-name">${ch.name}</div>
        </div>
    `).join('');
    document.getElementById("count").textContent = list.length + " CH";
}

function playChannel(url, name, logo, updateRecent = true, id = '') {
    document.getElementById("now-playing-text").innerText = "দেখছেন: " + name;
    
    // Focus & Highlight Active Channel
    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active-playing'));
    const activeCard = document.getElementById('ch-' + id);
    if(activeCard) {
        activeCard.classList.add('active-playing');
        activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    if (updateRecent) {
        recentChannels = [{name, url, logo}, ...recentChannels.filter(c => c.url !== url)].slice(0, 8);
        localStorage.setItem('recentCh', JSON.stringify(recentChannels));
        renderRecent();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
    player.src({ type: 'application/x-mpegURL', src: url });
    player.play().catch(() => player.muted(true) && player.play());
}

function doSearch() {
    const q = document.getElementById("search").value.toLowerCase();
    const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(q));
    render(filtered);
}

function toggleFav(e, id) {
    e.stopPropagation();
    favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
    localStorage.setItem('myFavs', JSON.stringify(favorites));
    render(allChannels);
}

function renderRecent() {
    document.getElementById("recent-list").innerHTML = recentChannels.map(ch => `
        <div class="recent-item" onclick="playChannel('${ch.url}', '${ch.name}', '${ch.logo}')">
            <img src="${ch.logo}">
        </div>
    `).join('');
}

function filterCat(cat, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(allChannels.filter(ch => cat === 'all' ? true : (cat === 'fav' ? favorites.includes(ch.id) : ch.cat.includes(cat) || ch.name.toLowerCase().includes(cat))));
}

function adjustLayout() {
    document.getElementById('content-area').style.marginTop = document.getElementById('top-section').offsetHeight + 'px';
}

window.addEventListener('resize', adjustLayout);
init();
</script>

<script src="https://pl28744078.effectivegatecpm.com/77/45/12/774512aa06cc31fabddd395b71e127b6.js"></script>
<script src="https://pl28744070.effectivegatecpm.com/d0/6e/79/d06e79767e37c835c1f36cc898ad6320.js"></script>

</body>
</html>
