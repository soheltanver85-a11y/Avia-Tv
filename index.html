<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avia TV - Live TV Channels & Sports Online Free</title>
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>

<style>
:root{
--primary:#00e5ff;
--bg:#0a0a0a;
--card:rgba(255,255,255,0.05);
--accent:#ff4081;
--star:#ffd700;
--tg:#24A1DE;
--apk:#3DDC84;

html,body{
margin:0;
padding:0;
background:var(--bg);
font-family:'Segoe UI',sans-serif;
overflow-x:hidden;
}

/* ===== New Brand Design ===== */
.brand-title-new{
font-size:18px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(45deg,#ff00cc,#3333ff,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 15px rgba(0,229,255,0.4);
animation:glowText 2s infinite alternate;
}
@keyframes glowText{
from{filter:brightness(1);}
to{filter:brightness(1.4);}
}

#top-section{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
z-index:1000;
border-bottom:1px solid #222;
}

.brand-header{
padding:10px 15px;
display:flex;
align-items:center;
}

.video-container{
position:relative;
width:100%;
aspect-ratio:16/9;
max-width:1200px;
margin:0 auto;
background:#000;
}

.video-js{width:100%!important;height:100%!important;}

header{
padding:8px 12px;
background:#111;
}

.header-top{
display:flex;
justify-content:flex-end;
gap:12px;
margin-bottom:10px;
}

.circle-btn{
width:44px;
height:44px;
font-size:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
text-decoration:none;
}

.btn-tg{color:var(--tg);background:rgba(36,161,222,0.1);}
.btn-apk{color:var(--apk);background:rgba(61,220,132,0.1);}
.btn-share{color:#fff;background:rgba(255,255,255,0.05);}
.btn-rotate{color:#fff;background:var(--accent);}

.search-row{
display:flex;
gap:8px;
margin-bottom:8px;
}

#search{
flex:1;
background:#1a1a1a;
border:1px solid #333;
color:white;
padding:10px;
border-radius:6px;
font-size:14px;
}

#count{
font-size:11px;
color:var(--primary);
font-weight:bold;
}

#channelList{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(95px,1fr));
gap:12px;
padding:15px;
}

.channel-card{
background:var(--card);
border-radius:12px;
padding:15px 5px;
text-align:center;
cursor:pointer;
position:relative;
}

.fav-star{
position:absolute;
top:6px;
right:8px;
font-size:18px;
color:rgba(255,255,255,0.2);
}
.fav-star.active{color:var(--star);}

.channel-logo{height:35px;object-fit:contain;margin-bottom:8px;}
.channel-name{font-size:10px;color:#ccc;}

.footer-area{
padding:40px 0 80px 0;
text-align:center;
}

/* ===== Glowing Developer Credit ===== */
.dev-credit{
font-size:14px;
font-weight:bold;
margin-top:15px;
background:linear-gradient(90deg,#00e5ff,#ff00cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glowDev 1.5s infinite alternate;
}
@keyframes glowDev{
from{text-shadow:0 0 5px #00e5ff;}
to{text-shadow:0 0 20px #ff00cc;}
}

</style>
</head>
<body>

<div id="top-section">
<div class="brand-header">
<div class="brand-title-new">AVIA TV</div>
</div>

<div class="video-container">
<video id="v-player" class="video-js vjs-big-play-centered" controls></video>
</div>

<header>
<div class="header-top">
<a href="https://t.me/techbd_group" target="_blank" class="circle-btn btn-tg">✈️</a>
<a href="https://www.mediafire.com/file/2c8yvb7c9dw2abz/Avia_Tv.apk/file" target="_blank" class="circle-btn btn-apk">📥</a>
<button onclick="shareApp()" class="circle-btn btn-share">🔗</button>
<button onclick="toggleRotateManual()" class="circle-btn btn-rotate">🔄</button>
</div>

<div class="search-row">
<input type="text" id="search" placeholder="সার্চ চ্যানেল...">
<span id="count">0 CH</span>
</div>
</header>
</div>

<div id="content-area">
<div id="channelList">লোডিং...</div>

<div class="footer-area">
<div id="online-status" style="color:#4CAF50;font-weight:bold;">Online...</div>
<div class="dev-credit">DEVELOPED BY SOHEL TANVER</div>
</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl="https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels=[];
let favorites=JSON.parse(localStorage.getItem('myFavs'))||[];
let player=videojs('v-player');

async function init(){
const res=await fetch(playlistUrl);
const data=await res.text();
allChannels=parseM3U(data);
renderChannels(allChannels);
if(allChannels.length>0){
player.src({src:allChannels[0].url,type:'application/x-mpegURL'});
player.play();
}
}
function parseM3U(data){
const lines=data.split("\n"),list=[];
let cur={};
lines.forEach(l=>{
l=l.trim();
if(l.startsWith("#EXTINF")){
cur.name=l.split(",")[1]?.trim();
cur.logo=l.match(/tvg-logo="([^"]+)"/)?.[1];
cur.id=btoa(unescape(encodeURIComponent(cur.name)));
}
else if(l.startsWith("http")){
cur.url=l;
list.push({...cur});
cur={};
}
});
return list;
}
function renderChannels(list){
const grid=document.getElementById("channelList");
grid.innerHTML=list.map(ch=>{
const isFav=favorites.includes(ch.id);
return `<div class="channel-card" onclick="playStream('${ch.url}')">
<span class="fav-star ${isFav?'active':''}" onclick="toggleFav(event,'${ch.id}')">★</span>
<img src="${ch.logo}" class="channel-logo">
<div class="channel-name">${ch.name}</div>
</div>`;
}).join('');
document.getElementById("count").textContent=list.length+" CH";
}
function playStream(url){
player.src({src:url,type:'application/x-mpegURL'});
player.play();
}
function toggleFav(e,id){
e.stopPropagation();
if(favorites.includes(id))favorites=favorites.filter(f=>f!==id);
else favorites.push(id);
localStorage.setItem('myFavs',JSON.stringify(favorites));
renderChannels(allChannels);
}

/* ===== Smart Search ===== */
document.getElementById("search").addEventListener("input",function(){
const val=this.value.toLowerCase().trim();
if(!val){renderChannels(allChannels);return;}
const filtered=allChannels.filter(ch=>ch.name&&ch.name.toLowerCase().includes(val));
renderChannels(filtered);
});

function shareApp(){
if(navigator.share)
navigator.share({title:'Avia Tv',url:window.location.href});
else{
navigator.clipboard.writeText(window.location.href);
alert("Link Copied!");
}
}

init();
</script>

</body>
</html>
