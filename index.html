<!DOCTYPE html>
<html lang="bn">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99V1DXBKKT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-99V1DXBKKT');
  </script>

  <script src="https://pl28744070.effectivegatecpm.com/d0/6e/79/d06e79767e37c835c1f36cc898ad6320.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Avia TV - Live TV Channels & Sports Online Free</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --focus: #00e5ff; --accent: #ff4081; --star: #ffd700; 
      --tg: #24A1DE; --apk: #3DDC84; --online: #4CAF50;
      --brand-gradient: linear-gradient(45deg, #ffd700, #ff8c00);
    }

    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

    /* ফুলস্ক্রিন হলে সব হাইড হবে (Fix) */
    .vjs-fullscreen #brand-header, 
    .vjs-fullscreen #ticker, 
    .vjs-fullscreen header, 
    .vjs-fullscreen #content-area,
    .vjs-fullscreen .brand-header { display: none !important; }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #222; }
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; max-width: 1200px; margin: 0 auto; background: #000; overflow: hidden; }
    .video-js { width: 100% !important; height: 100% !important; }
    
    #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 1; }
    .gesture-indicator { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.8); color: var(--primary); padding: 12px 20px; border-radius: 30px; font-size: 16px; font-weight: bold; z-index: 100; display: none; pointer-events: none; border: 1px solid var(--primary); }
    #vol-indicator { right: 20px; }
    #bri-indicator { left: 20px; }

    .brand-header { padding: 10px 15px; background: #111; display: flex; align-items: center; justify-content: flex-start; }
    .brand-title-new { 
      font-size: 18px; 
      font-weight: 800; 
      background: var(--brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #ticker { background: #001a1a; color: #fff; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--primary); overflow: hidden; }
    .ticker-content { display: inline-block; animation: marquee 20s linear infinite; white-space: nowrap; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    
    header { padding: 8px 12px; background: #111; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; height: 40px; }
    #recent-list { flex: 1; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .recent-item { min-width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; flex-shrink: 0; cursor: pointer; }
    .recent-item img { width: 75%; height: 75%; object-fit: contain; }

    .action-btns { display: flex; gap: 8px; align-items: center; }
    .circle-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 14px; }
    .btn-rotate { color: #fff; background: var(--accent); border: 1px solid var(--accent); font-weight: bold; }

    .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    #search { flex: 1; background:#1a1a1a; border:1px solid #333; color:white; padding: 8px; border-radius: 6px; outline: none; }
    #count { font-size: 10px; color: var(--primary); background: rgba(0, 229, 255, 0.1); padding: 4px 8px; border-radius: 4px; }

    .tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { padding: 6px 14px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 5px; cursor: pointer; }
    .tab-btn.active { background: var(--accent); color: white; }

    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 12px; padding: 15px; }
    .channel-card { background: var(--card); border-radius: 12px; padding: 15px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.05); min-height: 90px; cursor: pointer; position: relative; }
    .fav-star { position: absolute; top: 6px; right: 8px; font-size: 20px; color: rgba(255,255,255,0.2); z-index: 10; }
    .fav-star.active { color: var(--star); }
    .channel-logo { height: 35px; object-fit: contain; margin-bottom: 8px; }
    .channel-name { font-size: 10px; color: #ccc; }

    .footer-area { padding: 40px 0 80px 0; text-align: center; }
    #online-status { font-size: 11px; color: var(--online); background: rgba(76, 175, 80, 0.1); padding: 5px 15px; border-radius: 50px; border: 1px solid rgba(76, 175, 80, 0.2); }
  </style>
</head>
<body>

<div id="top-section">
  <div id="brand-header" class="brand-header"><div class="brand-title-new">AVIA TV</div></div>

  <div id="ticker">
    <div class="ticker-content">
      <span id="now-playing-text" style="color: var(--primary); font-weight: bold;">চ্যানেল নির্বাচন করুন...</span>
      <span style="margin-left: 20px;">📢 TECH BD GROUP এ স্বাগতম</span>
    </div>
  </div>

  <div class="video-container" id="player-wrapper">
    <video id="v-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    <div id="brightness-overlay"></div>
    <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
    <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
  </div>

  <header id="main-header">
    <div class="header-top">
      <div id="recent-list"></div>
      <div class="action-btns">
        <button onclick="shareApp()" class="circle-btn" style="background:rgba(255,255,255,0.05); color:#fff">🔗</button>
        <button onclick="toggleRotateManual()" class="circle-btn btn-rotate">🔄</button>
      </div>
    </div>
    <div class="search-row">
      <input type="text" id="search" placeholder="সার্চ চ্যানেল...">
      <span id="count">0 CH</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
      <button class="tab-btn" onclick="filterCat('sports', this)">Sports</button>
      <button class="tab-btn" style="color:var(--star)" onclick="filterCat('fav', this)">★ Fav</button>
    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
  <div class="footer-area">
    <div id="online-status">Online...</div>
    <div style="color:#555; font-size:11px; margin-top:10px;">DEVELOPED BY SOHEL TANVER</div>
  </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let recentChannels = JSON.parse(localStorage.getItem('recentCh')) || [];
let player, currentCategory = 'all';

// --- জেস্টার লজিক ---
let startY, startVal, isBrightness;
const wrapper = document.getElementById('player-wrapper');
const briOverlay = document.getElementById('brightness-overlay');
const volInd = document.getElementById('vol-indicator');
const briInd = document.getElementById('bri-indicator');

// --- স্মার্ট সার্চ ---
document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase().trim();
  if (!val) { applyCurrentFilter(); return; }
  const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(val));
  renderChannels(filtered);
});

// --- ফেভারিট লজিক ---
function toggleFav(event, id) {
  event.stopPropagation();
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('myFavs', JSON.stringify(favorites));
  applyCurrentFilter();
}

function filterCat(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyCurrentFilter();
}

function applyCurrentFilter() {
  let list = allChannels;
  if (currentCategory === 'fav') list = allChannels.filter(ch => favorites.includes(ch.id));
  else if (currentCategory === 'sports') list = allChannels.filter(ch => ch.name.toLowerCase().includes('sport'));
  renderChannels(list);
}

// --- প্লেয়ার ও জেস্টার ---
async function init() {
  player = videojs('v-player', { fluid: true });

  wrapper.addEventListener('touchstart', (e) => {
    startY = e.touches[0].pageY;
    const rect = wrapper.getBoundingClientRect();
    isBrightness = (e.touches[0].pageX - rect.left) < rect.width / 2;
    startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : player.volume();
  });

  wrapper.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) return;
    const diff = (startY - e.touches[0].pageY) / 180; 
    let newVal = Math.min(Math.max(startVal + diff, 0), 1);
    if (isBrightness) {
      briOverlay.style.opacity = 1 - newVal;
      briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
      briInd.style.display = 'block';
    } else {
      player.volume(newVal);
      volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
      volInd.style.display = 'block';
    }
  });

  wrapper.addEventListener('touchend', () => {
    setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
  });

  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderChannels(allChannels);
    renderRecent();
    document.getElementById("content-area").style.marginTop = document.getElementById('top-section').offsetHeight + 'px';
    if(allChannels.length > 0) playStream(allChannels[0].url, allChannels[0].name, allChannels[0].logo, false, false);
  } catch(e) {}
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim();
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1];
      cur.id = btoa(unescape(encodeURIComponent(cur.name)));
    } else if (l.startsWith("http")) { cur.url = l; list.push({...cur}); cur = {}; }
  });
  return list;
}

function renderChannels(list) {
  const grid = document.getElementById("channelList");
  grid.innerHTML = list.map(ch => {
    const isFav = favorites.includes(ch.id);
    return `<div class="channel-card" onclick="playStream('${ch.url}', '${ch.name}', '${ch.logo}', true, true)">
      <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
      <img src="${ch.logo}" class="channel-logo" loading="lazy">
      <div class="channel-name">${ch.name}</div>
    </div>`;
  }).join('');
  document.getElementById("count").textContent = list.length + " CH";
}

function playStream(url, name, logo, updateRecent = true, showSpinner = true) {
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name;
  if (updateRecent) {
    recentChannels = recentChannels.filter(c => c.url !== url);
    recentChannels.unshift({name, url, logo});
    if (recentChannels.length > 8) recentChannels.pop();
    localStorage.setItem('recentCh', JSON.stringify(recentChannels));
    renderRecent();
  }
  player.src({ src: url, type: 'application/x-mpegURL' });
  player.play().catch(() => {});
}

function renderRecent() {
  document.getElementById("recent-list").innerHTML = recentChannels.map(ch => `<div class="recent-item" onclick="playStream('${ch.url}', '${ch.name}', '${ch.logo}', true, true)"><img src="${ch.logo}"></div>`).join('');
}

function toggleRotateManual() {
  if (!player) return;
  if (!player.isFullscreen()) player.requestFullscreen().catch(() => {});
  else player.exitFullscreen();
}

init();
</script>
</body>
</html>
