<!DOCTYPE html>
<html lang="bn">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99V1DXBKKT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-99V1DXBKKT');

  <script src="https://pl28744070.effectivegatecpm.com/d0/6e/79/d06e79767e37c835c1f36cc898ad6320.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Avia TV - Live TV</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --accent: #ff4081; --star: #ffd700; --tg: #24A1DE; --apk: #3DDC84;
      --brand-gradient: linear-gradient(45deg, #ffd700, #ff8c00);
    }

    body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }

    /* ফুলস্ক্রিন হলে সব হাইড হবে (CSS Fix) */
    .vjs-fullscreen-mode #top-section, 
    .vjs-fullscreen-mode #brand-header,
    .vjs-fullscreen-mode #ticker,
    .vjs-fullscreen-mode header,
    .vjs-fullscreen-mode #content-area { display: none !important; }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; }
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
    .video-js { width: 100% !important; height: 100% !important; }
    
    #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 1; }
    .gesture-indicator { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.8); color: var(--primary); padding: 10px 20px; border-radius: 30px; z-index: 100; display: none; }

    .brand-header { padding: 12px 15px; background: #111; }
    .brand-title-new { font-size: 18px; font-weight: 800; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

    #ticker { background: #001a1a; color: #fff; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--primary); overflow: hidden; }
    .ticker-content { display: inline-block; animation: marquee 20s linear infinite; white-space: nowrap; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    
    header { padding: 10px; background: #111; }
    .action-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .wide-btn { height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); cursor: pointer; }
    
    .btn-tg { border-color: var(--tg); }
    .btn-rotate { background: var(--accent); }

    .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
    #search { flex: 1; background:#1a1a1a; border:1px solid #333; color:white; padding: 10px; border-radius: 8px; outline: none; }
    #count { font-size: 11px; color: var(--primary); background: rgba(0, 229, 255, 0.1); padding: 5px 10px; border-radius: 6px; display: flex; align-items: center; }

    .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
    .tab-btn { padding: 8px 18px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; padding: 15px; }
    .channel-card { background: var(--card); border-radius: 12px; padding: 15px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
    .fav-star { position: absolute; top: 5px; right: 5px; font-size: 18px; color: rgba(255,255,255,0.2); }
    .fav-star.active { color: var(--star); }
    .channel-logo { height: 40px; max-width: 80%; object-fit: contain; margin-bottom: 8px; }
    .channel-name { font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .footer-area { padding: 30px 0 100px; text-align: center; }
    #online-status { font-size: 12px; color: #4CAF50; background: rgba(76, 175, 80, 0.1); padding: 5px 15px; border-radius: 50px; border: 1px solid rgba(76, 175, 80, 0.2); }
  </style>
</head>
<body id="main-body">

<div id="top-section">
  <div id="brand-header" class="brand-header"><div class="brand-title-new">AVIA TV</div></div>
  <div id="ticker">
    <div class="ticker-content">
      <span id="now-playing-text" style="color: var(--primary); font-weight: bold;">চ্যানেল নির্বাচন করুন...</span>
      <span style="margin-left: 20px;">📢 TECH BD GROUP এ স্বাগতম। জয়েন করুন: t.me/techbd_group</span>
    </div>
  </div>

  <div class="video-container" id="player-wrapper">
    <video id="v-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    <div id="brightness-overlay"></div>
    <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
    <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
  </div>

  <header id="main-header">
    <div class="action-btns">
      <a href="https://t.me/techbd_group" target="_blank" class="wide-btn btn-tg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#24A1DE"><path d="M11.944 0C5.346 0 0 5.346 0 11.944C0 18.542 5.346 23.888 11.944 23.888C18.542 23.888 23.888 18.542 23.888 11.944C23.888 5.346 18.542 0 11.944 0ZM18.17 7.732L15.93 18.232C15.76 19.012 15.29 19.202 14.64 18.842L11.23 16.332L9.58 17.912C9.4 18.092 9.25 18.242 8.9 18.242L9.14 14.772L15.46 9.062C15.73 8.822 15.4 8.682 15.04 8.922L7.23 13.842L3.87 12.792C3.14 12.562 3.12 12.062 4.02 11.712L17.16 6.642C17.77 6.422 18.3 6.782 18.17 7.732Z"/></svg>
      </a>
      <a href="https://www.mediafire.com/file/2c8yvb7c9dw2abz/Avia_Tv.apk/file" target="_blank" class="wide-btn">📥</a>
      <button onclick="shareApp()" class="wide-btn">🔗</button>
      <button onclick="toggleRotateManual()" class="wide-btn btn-rotate">🔄</button>
    </div>

    <div class="search-row">
      <input type="text" id="search" placeholder="সার্চ চ্যানেল..." onkeyup="searchChannels()">
      <span id="count">0 CH</span>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
      <button class="tab-btn" onclick="filterCat('sports', this)">Sports</button>
      <button class="tab-btn" style="color:var(--star)" onclick="filterCat('fav', this)">★ Fav</button>
    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
  <div class="footer-area">
    <div id="online-status">Online: 0</div>
    <div style="color:#555; font-size:11px; margin-top:15px;">DEVELOPED BY SOHEL TANVER</div>
  </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let player, currentCategory = 'all';

// সার্চ ফাংশন (ফিক্স করা হয়েছে)
function searchChannels() {
  const val = document.getElementById("search").value.toLowerCase();
  const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(val));
  renderChannels(filtered);
}

function toggleFav(event, id) {
  event.stopPropagation();
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('myFavs', JSON.stringify(favorites));
  applyCurrentFilter();
}

function filterCat(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyCurrentFilter();
}

function applyCurrentFilter() {
  let list = allChannels;
  if (currentCategory === 'fav') list = allChannels.filter(ch => favorites.includes(ch.id));
  else if (currentCategory === 'sports') list = allChannels.filter(ch => ch.name.toLowerCase().includes('sport'));
  renderChannels(list);
}

async function init() {
  player = videojs('v-player', { fluid: true });

  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderChannels(allChannels);
    document.getElementById("content-area").style.marginTop = document.getElementById('top-section').offsetHeight + 'px';
    
    // অটো-লোড প্রথম চ্যানেল
    if(allChannels.length > 0) playStream(allChannels[0].url, allChannels[0].name);
  } catch(e) { console.error("Error loading playlist"); }

  // জেস্টার কন্ট্রোল
  setupGestures();
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim() || "Unknown";
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1] || "";
      cur.id = btoa(unescape(encodeURIComponent(cur.name)));
    } else if (l.startsWith("http")) { 
      cur.url = l; 
      list.push({...cur}); 
      cur = {}; 
    }
  });
  return list;
}

function renderChannels(list) {
  const grid = document.getElementById("channelList");
  grid.innerHTML = list.map(ch => {
    const isFav = favorites.includes(ch.id);
    return `<div class="channel-card" onclick="playStream('${ch.url}', '${ch.name}')">
      <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
      <img src="${ch.logo}" class="channel-logo" onerror="this.src='https://via.placeholder.com/50?text=TV'">
      <div class="channel-name">${ch.name}</div>
    </div>`;
  }).join('');
  document.getElementById("count").textContent = list.length + " CH";
}

function playStream(url, name) {
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name;
  player.src({ src: url, type: 'application/x-mpegURL' });
  player.play().catch(() => {});
}

function setupGestures() {
  let startY, startVal, isBrightness;
  const wrapper = document.getElementById('player-wrapper');
  const briOverlay = document.getElementById('brightness-overlay');
  const volInd = document.getElementById('vol-indicator');
  const briInd = document.getElementById('bri-indicator');

  wrapper.addEventListener('touchstart', (e) => {
    startY = e.touches[0].pageY;
    const rect = wrapper.getBoundingClientRect();
    isBrightness = (e.touches[0].pageX - rect.left) < rect.width / 2;
    startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : player.volume();
  });

  wrapper.addEventListener('touchmove', (e) => {
    const diff = (startY - e.touches[0].pageY) / 180; 
    let newVal = Math.min(Math.max(startVal + diff, 0), 1);
    if (isBrightness) {
      briOverlay.style.opacity = 1 - newVal;
      briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
      briInd.style.display = 'block';
    } else {
      player.volume(newVal);
      volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
      volInd.style.display = 'block';
    }
  });

  wrapper.addEventListener('touchend', () => {
    setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
  });
}

function toggleRotateManual() {
  if (!player.isFullscreen()) player.requestFullscreen();
  else player.exitFullscreen();
}

function shareApp() {
  if (navigator.share) navigator.share({ title: 'Avia Tv', url: window.location.href });
  else alert("Link: " + window.location.href);
}

init();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  const firebaseConfig = { databaseURL: "https://avia-tv-default-rtdb.firebaseio.com/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const onlineRef = ref(db, 'online_users');
  const myRef = push(onlineRef);
  set(myRef, true);
  onDisconnect(myRef).remove();
  onValue(onlineRef, (s) => {
    const count = s.val() ? Object.keys(s.val()).length : 0;
    document.getElementById("online-status").innerText = "Online: " + count;
  });
</script>
</body>
</html>
