<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Avia TV - Final Fixed</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  
  <style>
    :root { --primary: #00e5ff; --bg: #0a0a0a; --accent: #ff4081; }

    body { 
        margin: 0; background: var(--bg); color: white; 
        font-family: sans-serif; overflow-x: hidden;
    }

    /* উপরের ফিক্সড অংশ */
    #top-container {
        position: fixed; top: 0; left: 0; width: 100%;
        background: #111; z-index: 9999; /* সর্বোচ্চ প্রায়োরিটি */
        border-bottom: 2px solid #222;
    }

    .video-box { width: 100%; aspect-ratio: 16/9; background: #000; }
    .vjs-tech { pointer-events: auto !important; }

    /* সার্চ বার ডিজাইন - এটাকে টাচ করা সহজ করা হয়েছে */
    .search-area { padding: 10px; background: #111; }
    #main-search {
        width: 100%; padding: 12px; border-radius: 8px;
        border: 2px solid #444; background: #1a1a1a;
        color: white; font-size: 16px; outline: none;
        box-sizing: border-box; display: block;
    }
    #main-search:focus { border-color: var(--primary); }

    /* ট্যাব এবং বাটন */
    .header-info { display: flex; justify-content: space-between; align-items: center; padding: 5px 12px; }
    .action-icons { display: flex; gap: 8px; }
    .btn-circle { width: 30px; height: 30px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 14px; border: 1px solid #333; }

    .tabs-row { display: flex; gap: 8px; overflow-x: auto; padding: 8px 10px; scrollbar-width: none; }
    .tab { padding: 6px 15px; background: #222; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; border: 1px solid #333; }
    .tab.active { background: var(--accent); border-color: var(--accent); }

    /* চ্যানেল লিস্ট - স্ক্রল সমস্যা সমাধান */
    #content-list {
        margin-top: 350px; /* এই গ্যাপটি প্লেয়ার ও হেডারের জন্য */
        display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 12px; padding: 15px; padding-bottom: 100px;
    }

    .card { 
        background: rgba(255,255,255,0.05); border-radius: 12px; 
        padding: 10px; text-align: center; border: 1.5px solid transparent;
    }
    .card.playing { border-color: var(--primary); background: rgba(0,229,255,0.1); }
    .card img { width: 50px; height: 40px; object-fit: contain; margin-bottom: 5px; }
    .card div { font-size: 11px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #online-tag { text-align: center; padding: 20px; font-size: 12px; color: #4CAF50; }
  </style>
</head>
<body>

<div id="top-container">
    <div class="video-box">
        <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls playsinline style="width:100%; height:100%;"></video>
    </div>

    <div class="header-info">
        <div style="font-weight:bold; color:var(--primary)">AVIA TV</div>
        <div class="action-icons">
            <a href="https://telegram.dog/techbd_group" class="btn-circle">📩</a>
            <a href="https://www.mediafire.com/file/2c8yvb7c9dw2abz/Avia_Tv.apk/file" class="btn-circle">📥</a>
            <div onclick="location.reload()" class="btn-circle">🔄</div>
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="main-search" placeholder="চ্যানেলের নাম লিখুন (Search)..." autocomplete="off">
    </div>

    <div class="tabs-row">
        <div class="tab active" onclick="filterData('all', this)">All</div>
        <div class="tab" onclick="filterData('sports', this)">Sports</div>
        <div class="tab" onclick="filterData('bangla', this)">Bangla</div>
    </div>
</div>

<div id="content-list">লোড হচ্ছে...</div>

<div id="online-tag">Connecting Online Status...</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const m3uUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let masterData = [];
let player = videojs('tv-player');

// --- সার্চ লজিক (১০০% গ্যারান্টিড) ---
document.getElementById('main-search').addEventListener('input', function() {
    const val = this.value.toLowerCase().trim();
    const filtered = masterData.filter(item => item.name.toLowerCase().includes(val));
    displayChannels(filtered);
});

async function startApp() {
    try {
        const r = await fetch(m3uUrl);
        const txt = await r.text();
        masterData = parseM3U(txt);
        displayChannels(masterData);
        if(masterData.length > 0) loadVideo(masterData[0].url, masterData[0].id);
        
        // হেডার অনুযায়ী নিচের লিস্টের গ্যাপ ঠিক করা
        const headHeight = document.getElementById('top-container').offsetHeight;
        document.getElementById('content-list').style.marginTop = (headHeight + 10) + "px";
    } catch(e) { document.getElementById('content-list').innerHTML = "Error Loading!"; }
}

function parseM3U(data) {
    const lines = data.split('\n');
    const result = [];
    let obj = {};
    lines.forEach(line => {
        if(line.includes('#EXTINF')) {
            obj.name = line.split(',')[1].trim();
            obj.logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || "";
            obj.cat = line.match(/group-title="([^"]+)"/)?.[1]?.toLowerCase() || "";
            obj.id = btoa(obj.name).substring(0,10);
        } else if(line.startsWith('http')) {
            obj.url = line.trim();
            result.push({...obj});
            obj = {};
        }
    });
    return result;
}

function displayChannels(list) {
    const container = document.getElementById('content-list');
    if(list.length === 0) { container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>পাওয়া যায়নি!</p>"; return; }
    
    container.innerHTML = list.map(ch => `
        <div class="card" id="card-${ch.id}" onclick="loadVideo('${ch.url}', '${ch.id}')">
            <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/50'">
            <div>${ch.name}</div>
        </div>
    `).join('');
}

function loadVideo(url, id) {
    player.src({ type: 'application/x-mpegURL', src: url });
    player.play();
    document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
    const active = document.getElementById('card-' + id);
    if(active) active.classList.add('playing');
}

function filterData(cat, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const filtered = masterData.filter(ch => cat === 'all' || ch.cat.includes(cat) || ch.name.toLowerCase().includes(cat));
    displayChannels(filtered);
}

window.onload = startApp;
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  const firebaseConfig = { databaseURL: "https://avia-tv-default-rtdb.firebaseio.com/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const onlineRef = ref(db, 'online_users');
  const myRef = push(onlineRef);
  set(myRef, true);
  onDisconnect(myRef).remove();
  onValue(onlineRef, (s) => {
    const count = s.val() ? Object.keys(s.val()).length : 0;
    document.getElementById("online-tag").innerText = count + " Real-time Online Users";
  });
</script>

</body>
</html>
