    body { margin: 0; padding: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }

    /* Top Section Fixed */
    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #222; }

    /* Gesture Overlay UI */

    .recent-item img { width: 75%; height: 75%; object-fit: contain; }

    .action-btns { display: flex; gap: 6px; }
    .circle-btn { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; background: rgba(255,255,255,0.05); border: 1px solid #333; font-size: 13px; }

    .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    #search { flex: 1; background:#1a1a1a; border:1px solid #333; color:white; padding: 7px 12px; border-radius: 8px; font-size: 12px; outline: none; }
    #count { font-size: 10px; color: var(--primary); background: rgba(0,229,255,0.1); padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(0,229,255,0.2); }

    .tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
    .tab-btn { padding: 6px 12px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 6px; font-size: 11px; white-space: nowrap; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    #ticker { background: #001a1a; color: #fff; padding: 4px 0; font-size: 10px; overflow: hidden; border-bottom: 1px solid #111; }
    .ticker-content { display: inline-block; white-space: nowrap; animation: marquee 18s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    #content-area { padding-top: 10px; }
    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; padding: 12px; }
    .channel-card { background: var(--card); border-radius: 12px; padding: 12px 6px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; cursor: pointer; }
    .channel-card:active { transform: scale(0.95); border-color: var(--primary); }
    .fav-star { position: absolute; top: 5px; right: 5px; font-size: 16px; color: rgba(255,255,255,0.2); transition: 0.2s; }
    .fav-star.active { color: var(--star); text-shadow: 0 0 5px rgba(255,215,0,0.5); }
    .channel-logo { width: 45px; height: 35px; object-fit: contain; margin-bottom: 6px; pointer-events: none; }
    .channel-name { font-size: 10px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; pointer-events: none; }

    .footer-area { padding: 40px 0 80px 0; text-align: center; }
    #online-status { font-size: 10px; color: #4CAF50; background: rgba(76,175,80,0.1); padding: 5px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
    .footer-credit { font-size: 10px; color: #555; letter-spacing: 1px; }

    /* Overlay for Brightness Control */
    #brightness-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: black; pointer-events: none; z-index: 9999; opacity: 0;
    }
  </style>

<body>

      <span id="now-playing-text" style="color: var(--primary); font-weight: bold;">চ্যানেল নির্বাচন করুন...</span>
      <span style="margin-left: 25px;">📢 আমাদের টেলিগ্রাম গ্রুপে যুক্ত হন: <a href="https://telegram.dog/techbd_group" style="color:var(--star); text-decoration:none;">TECH BD GROUP</a></span>
    </div>
  </div>

  <header>
    <div class="header-top">
      <div class="brand-title">AVIA<br>TV</div>
      <div id="recent-list"></div>
      <div class="action-btns">
        <a href="https://telegram.dog/techbd_group" class="circle-btn" title="Telegram" style="color:#24A1DE">📩</a>
        <a href="https://www.mediafire.com/file/2c8yvb7c9dw2abz/Avia_Tv.apk/file" class="circle-btn" title="Download APK" style="color:#3DDC84">📥</a>

      <input type="text" id="search" placeholder="সার্চ চ্যানেল...">
      <span id="count">0 CH</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
      <button class="tab-btn" onclick="filterCat('sports', this)">Sports</button>
      <button class="tab-btn" onclick="filterCat('bangla', this)">Bangla</button>

    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
  <div class="footer-area">
    <div id="online-status">Loading Online...</div>
    <div class="footer-credit">DEVELOPED BY <b style="color:var(--primary)">SOHEL TANVER</b></div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://unpkg.com/videojs-mobile-ui/dist/videojs-mobile-ui.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let recentChannels = JSON.parse(localStorage.getItem('recentCh')) || [];
let player;

// Initialize Video.js
player = videojs('my-video', {
    fluid: true,
    controlBar: {
        children: ['playToggle', 'volumePanel', 'currentTimeDisplay', 'timeDivider', 'durationDisplay', 'progressControl', 'fullscreenToggle']
    }
});

// Mobile UI for double tap to seek
player.mobileUi();

// Gesture Control Logic
const playerWrapper = document.getElementById('player-wrapper');
const bStatus = document.getElementById('brightness-status');
const vStatus = document.getElementById('volume-status');
const bOverlay = document.getElementById('brightness-overlay');

let touchStartY;
let isRightSide = false;

playerWrapper.addEventListener('touchstart', e => {
    const touchX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isRightSide = touchX > (window.innerWidth / 2);
});

playerWrapper.addEventListener('touchmove', e => {
    const touchY = e.touches[0].clientY;
    const diffY = touchStartY - touchY;

    if (isRightSide) {
        let vol = player.volume();
        vol = Math.max(0, Math.min(1, vol + (diffY * 0.005)));
        player.volume(vol);
        vStatus.style.display = 'block';
        vStatus.innerText = `🔊 ${Math.round(vol * 100)}%`;
    } else {
        let currentOpacity = parseFloat(bOverlay.style.opacity) || 0;
        let newOpacity = Math.max(0, Math.min(0.85, currentOpacity - (diffY * 0.005)));
        bOverlay.style.opacity = newOpacity;
        bStatus.style.display = 'block';
        bStatus.innerText = `☀️ ${Math.round((1 - newOpacity) * 100)}%`;
    }
    touchStartY = touchY;
    e.preventDefault();
}, { passive: false });

playerWrapper.addEventListener('touchend', () => {
    setTimeout(() => {
        bStatus.style.display = 'none';
        vStatus.style.display = 'none';
    }, 600);
});

// App Logic
async function init() {
  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    render(allChannels);
    renderRecent();
    adjustLayout();
    if(allChannels.length > 0) playChannel(allChannels[0].url, allChannels[0].name, allChannels[0].logo, false);
  } catch(e) { document.getElementById("channelList").innerText = "Error Loading Playlist."; }
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim() || "Unknown";
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1] || "";
      cur.cat = (l.match(/group-title="([^"]+)"/)?.[1] || "").toLowerCase();
      cur.id = btoa(unescape(encodeURIComponent(cur.name)));
    } else if (l.startsWith("http")) { cur.url = l; list.push({...cur}); cur = {}; }
  });
  return list;
}

function render(list) {
  const grid = document.getElementById("channelList");
  grid.innerHTML = list.map(ch => {
    const isFav = favorites.includes(ch.id);
    return `
      <div class="channel-card" onclick="playChannel('${ch.url}', '${ch.name}', '${ch.logo}')">
        <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
        <img src="${ch.logo}" class="channel-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/50?text=TV'">
        <div class="channel-name">${ch.name}</div>
      </div>
    `;
  }).join('');
  document.getElementById("count").textContent = list.length + " CH";
}

function playChannel(url, name, logo, updateRecent = true) {
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name + " | ";
  if (updateRecent) {
    recentChannels = recentChannels.filter(c => c.url !== url);
    recentChannels.unshift({name, url, logo});
    if (recentChannels.length > 8) recentChannels.pop();
    localStorage.setItem('recentCh', JSON.stringify(recentChannels));
    renderRecent();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
  player.src({ type: 'application/x-mpegURL', src: url });
  player.play().catch(() => { player.muted(true); player.play(); });
}

function toggleFav(event, id) {
  event.stopPropagation();
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('myFavs', JSON.stringify(favorites));
  render(allChannels); 
}

function renderRecent() {
  const listEl = document.getElementById("recent-list");
  listEl.innerHTML = recentChannels.map(ch => `
    <div class="recent-item" onclick="playChannel('${ch.url}', '${ch.name}', '${ch.logo}')">
      <img src="${ch.logo}" title="${ch.name}">
    </div>
  `).join('');
}

function filterCat(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let filtered = allChannels.filter(ch => {
    if(cat==='all') return true;
    if(cat==='fav') return favorites.includes(ch.id);
    return (ch.cat && ch.cat.includes(cat)) || ch.name.toLowerCase().includes(cat);
  });
  render(filtered);
}

function adjustLayout() {
  document.getElementById('content-area').style.marginTop = document.getElementById('top-section').offsetHeight + 'px';
}

function shareApp() {
  if (navigator.share) { navigator.share({ title: 'Avia TV', url: window.location.href }); }
  else { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); }
}

document.getElementById("search").addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  render(allChannels.filter(ch => ch.name.toLowerCase().includes(q)));
});

window.addEventListener('resize', adjustLayout);
init();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  const firebaseConfig = { databaseURL: "https://avia-tv-default-rtdb.firebaseio.com/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const onlineUsersRef = ref(db, 'online_users');
  const myUserRef = push(onlineUsersRef);
  set(myUserRef, true);
  onDisconnect(myUserRef).remove();
  onValue(onlineUsersRef, (snapshot) => {
    const count = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
    document.getElementById("online-status").innerText = count + " Real-time Online";
  });
</script>
