<!DOCTYPE html>
<html lang="bn">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99V1DXBKKT"></script>
  <script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Avia TV - Live TV Channels & Sports Online Free</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  
  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --focus: #00e5ff; --accent: #ff4081; --star: #ffd700; 
      --tg: #24A1DE; --apk: #3DDC84; --online: #4CAF50;
    }

    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      background: var(--bg); font-family: 'Segoe UI', sans-serif;
    }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #222; }
    
    /* Video.js Custom Styling */
    .video-container { width: 100%; aspect-ratio: 16/9; max-width: 1200px; margin: 0 auto; background: #000; }
    .video-js { width: 100% !important; height: 100% !important; }
    .vjs-big-play-button { top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; border-radius: 50% !important; width: 2em !important; height: 2em !important; line-height: 2em !important; }

    header { padding: 8px 12px; background: #111; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; height: 40px; }
    .brand-title { font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 0.5px; opacity: 0.8; }
    
    #recent-list { flex: 1; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; align-items: center; }
    .recent-item { min-width: 32px; height: 32px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; flex-shrink: 0; cursor: pointer; }
    .recent-item img { width: 75%; height: 75%; object-fit: contain; }

    .action-btns { display: flex; gap: 5px; }
    .circle-btn { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); border: none; cursor: pointer; }
    .btn-tg { color: var(--tg); background: rgba(36, 161, 222, 0.1); }
    .btn-apk { color: var(--apk); background: rgba(61, 220, 132, 0.1); }
    .btn-share { color: #fff; background: rgba(255, 255, 255, 0.05); }

    .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    #search { flex: 1; background:#1a1a1a; border:1px solid #333; color:white; padding: 8px 12px; border-radius: 6px; font-size: 13px; outline: none; }
    #search:focus { border-color: var(--primary); }
    #count { font-size: 10px; color: var(--primary); font-weight: bold; background: rgba(0, 229, 255, 0.1); padding: 4px 8px; border-radius: 4px; white-space: nowrap; }

    .tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
    .tab-btn { padding: 6px 12px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 5px; font-size: 11px; white-space: nowrap; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    #ticker { background: #001a1a; color: #fff; padding: 3px 0; font-size: 10px; border-bottom: 1px solid var(--primary); overflow: hidden; }
    .ticker-content { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    #content-area { position: relative; width: 100%; background: var(--bg); }
    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; padding: 15px; }
    .channel-card { background: var(--card); border-radius: 10px; padding: 10px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.05); height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.2s; }
    .channel-card:hover { background: rgba(255,255,255,0.1); }
    .fav-star { position: absolute; top: 5px; right: 5px; font-size: 18px; color: rgba(255,255,255,0.2); z-index: 5; transition: 0.2s; }
    .fav-star.active { color: var(--star); }
    .channel-logo { max-width: 60%; height: 35px; object-fit: contain; margin-bottom: 8px; pointer-events: none; }
    .channel-name { font-size: 10px; color: #ccc; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; width: 90%; pointer-events: none; }

    .footer-area { padding: 30px 0 60px 0; text-align: center; }
    #online-status { font-size: 10px; color: var(--online); font-weight: bold; background: rgba(76, 175, 80, 0.1); padding: 4px 12px; border-radius: 50px; border: 1px solid rgba(76, 175, 80, 0.2); display: inline-flex; align-items: center; gap: 5px; }
    .footer-credit { color: #555; font-size: 10px; letter-spacing: 1px; margin-top: 10px; }
  </style>
</head>
<body>

<div id="top-section">
  <div id="player-wrapper">
    <div class="video-container">
      <video id="video-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>
    <div id="ticker">
      <div class="ticker-content">
        <span id="now-playing-text" style="color: var(--primary); font-weight: bold;">চ্যানেল নির্বাচন করুন...</span>
        <span style="margin-left: 20px;">📢 পরামর্শ বা অভিযোগ: <a href="https://telegram.dog/techbd_group" target="_blank" style="color:#ffd700; text-decoration:none;">TECH BD GROUP</a></span>
      </div>
    </div>
    <header>
      <div class="header-top">
        <div class="brand-title">Avia<br>Tv</div>
        <div id="recent-list"></div>
        <div class="action-btns">
          <a href="https://telegram.dog/techbd_group" target="_blank" class="circle-btn btn-tg">📩</a>
          <a href="https://www.mediafire.com/file/2c8yvb7c9dw2abz/Avia_Tv.apk/file" target="_blank" class="circle-btn btn-apk">📥</a>
          <button onclick="shareApp()" class="circle-btn btn-share">🔗</button>
        </div>
      </div>
      <div class="search-row">
        <input type="text" id="search" placeholder="সার্চ চ্যানেল (যেমন: Somoy, T Sports)...">
        <span id="count">0 CH</span>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
        <button class="tab-btn" onclick="filterCat('sports', this)">Live Sports</button>
        <button class="tab-btn" onclick="filterCat('bangla', this)">Bangla</button>
        <button class="tab-btn" style="color:var(--star)" onclick="filterCat('fav', this)">★ Fav</button>
      </div>
    </header>
  </div>
</div>

<div id="content-area">
  <div id="channelList">লোডিং হচ্ছে...</div>
  <div class="footer-area">
    <div id="online-status">Loading Online...</div>
    <div class="footer-credit">DEVELOPED BY <b style="color:var(--primary)">SOHEL TANVER</b></div>
  </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let recentChannels = JSON.parse(localStorage.getItem('recentCh')) || [];
let player;
let currentSearchQuery = "";
let currentCategory = "all";

// Initialize Video.js
document.addEventListener('DOMContentLoaded', () => {
    player = videojs('video-player', {
        fluid: true,
        autoplay: false,
        controls: true,
        responsive: true
    });
    init();
});

function adjustLayout() {
  const topH = document.getElementById('top-section').offsetHeight;
  document.getElementById("content-area").style.marginTop = topH + 'px';
}
window.addEventListener('resize', adjustLayout);

async function init() {
  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderList(); // Initial render
    renderRecent();
    setTimeout(adjustLayout, 500);
    
    if(allChannels.length > 0) {
        playFromUrl(allChannels[0].url, allChannels[0].name, allChannels[0].logo, false);
    }
  } catch(e) { 
    document.getElementById("channelList").innerText = "চ্যানেল লোড করতে সমস্যা হয়েছে।"; 
  }
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim() || "Unknown";
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1] || "";
      cur.cat = (l.match(/group-title="([^"]+)"/)?.[1] || "").toLowerCase();
      cur.id = btoa(unescape(encodeURIComponent(cur.name)));
    } else if (l.startsWith("http")) { 
        cur.url = l; 
        list.push({...cur}); 
        cur = {}; 
    }
  });
  return list;
}

// Optimized Search & Filter Logic
function renderList() {
    const grid = document.getElementById("channelList");
    let filtered = allChannels.filter(ch => {
        const matchesSearch = ch.name.toLowerCase().includes(currentSearchQuery);
        let matchesCat = true;
        if(currentCategory === 'fav') matchesCat = favorites.includes(ch.id);
        else if(currentCategory !== 'all') matchesCat = (ch.cat && ch.cat.includes(currentCategory)) || ch.name.toLowerCase().includes(currentCategory);
        
        return matchesSearch && matchesCat;
    });

    if(filtered.length === 0) {
        grid.innerHTML = `<div style="color:#666; padding:20px; text-align:center; grid-column: 1/-1;">কোনো চ্যানেল পাওয়া যায়নি।</div>`;
    } else {
        grid.innerHTML = filtered.map(ch => {
            const isFav = favorites.includes(ch.id);
            return `
              <div class="channel-card" onclick="playFromUrl('${ch.url}', '${ch.name}', '${ch.logo}')">
                <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
                <img src="${ch.logo}" class="channel-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/50x30?text=TV'">
                <div class="channel-name">${ch.name}</div>
              </div>
            `;
        }).join('');
    }
    document.getElementById("count").textContent = filtered.length + " CH";
}

function playFromUrl(url, name, logo, updateRecent = true) {
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name + " | ";
  
  if (updateRecent) {
    recentChannels = recentChannels.filter(c => c.url !== url);
    recentChannels.unshift({name, url, logo});
    if (recentChannels.length > 8) recentChannels.pop();
    localStorage.setItem('recentCh', JSON.stringify(recentChannels));
    renderRecent();
  }

  player.src({ type: 'application/x-mpegURL', src: url });
  player.play().catch(() => {
      console.log("Autoplay blocked, waiting for user interaction.");
  });
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Search Input Listener
document.getElementById("search").addEventListener('input', (e) => {
    currentSearchQuery = e.target.value.toLowerCase();
    renderList();
});

function filterCat(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function toggleFav(event, id) {
  event.stopPropagation();
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
    event.target.classList.remove('active');
  } else {
    favorites.push(id);
    event.target.classList.add('active');
  }
  localStorage.setItem('myFavs', JSON.stringify(favorites));
  if (currentCategory === 'fav') renderList();
}

function renderRecent() {
  const listEl = document.getElementById("recent-list");
  if (recentChannels.length === 0) { listEl.innerHTML = ''; return; }
  listEl.innerHTML = recentChannels.map(ch => `
    <div class="recent-item" onclick="playFromUrl('${ch.url}', '${ch.name}', '${ch.logo}')">
      <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/20x20?text=TV'">
    </div>
  `).join('');
}

function shareApp() {
  if (navigator.share) { 
    navigator.share({ title: 'Avia Tv', text: 'লাইভ টিভি দেখুন!', url: window.location.href }); 
  } else { 
    navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); 
  }
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  const firebaseConfig = { databaseURL: "https://avia-tv-default-rtdb.firebaseio.com/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const onlineUsersRef = ref(db, 'online_users');
  const myUserRef = push(onlineUsersRef);
  set(myUserRef, true);
  onDisconnect(myUserRef).remove();
  onValue(onlineUsersRef, (snapshot) => {
    const data = snapshot.val();
    const count = data ? Object.keys(data).length : 0;
    const statusEl = document.getElementById("online-status");
    if (statusEl) statusEl.innerText = count + " Real-time Online";
  });
</script>

</body>
</html>
