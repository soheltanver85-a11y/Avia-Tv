<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Avia TV - Live TV</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --accent: #ff4081; --tg: #24A1DE; --apk: #3DDC84; 
    }

    /* পেজ রিফ্রেশ হওয়া বন্ধ করার জন্য */
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: #fff; 
      font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
      overscroll-behavior-y: contain; 
    }

    /* ব্র্যান্ড লোগো ডিজাইন */
    .brand-header { padding: 15px; background: #000; border-bottom: 1px solid #222; }
    .brand-title-new { 
      font-size: 22px; font-weight: 900; 
      background: linear-gradient(90deg, #00e5ff, #00ff88);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1.5px; border-left: 4px solid var(--accent);
      padding-left: 10px; text-transform: uppercase;
    }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: #111; }
    
    /* ভিডিও কন্টেইনার */
    .video-container { 
      position: relative; width: 100%; aspect-ratio: 16/9; 
      background: #000; touch-action: none; 
    }
    .video-js { width: 100% !important; height: 100% !important; }

    /* স্পিনার ডিলিট */
    .vjs-loading-spinner { display: none !important; }

    /* জেস্টার ইনডিকেটর স্টাইল */
    #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 5; }
    .gesture-indicator { 
      position: absolute; top: 50%; transform: translateY(-50%); 
      background: rgba(0,0,0,0.85); color: var(--primary); 
      padding: 12px 25px; border-radius: 50px; font-size: 16px; 
      font-weight: bold; z-index: 99999; display: none; 
      pointer-events: none; border: 1px solid var(--primary); 
    }
    #vol-indicator { right: 20px; }
    #bri-indicator { left: 20px; }

    header { padding: 10px; background: #111; }

    /* চ্যাপ্টা বাটন */
    .action-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
    .rect-btn { 
      height: 42px; border-radius: 4px; display: flex; align-items: center; justify-content: center; 
      text-decoration: none; font-size: 18px; color: #fff; background: rgba(255,255,255,0.1);
    }
    .btn-tg { background: var(--tg); }
    .btn-apk { background: var(--apk); }
    .btn-rotate { background: var(--accent); }

    /* সার্চ বক্স */
    .search-row { position: relative; margin-bottom: 10px; }
    #search { 
      width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; 
      padding: 10px 15px; border-radius: 6px; font-size: 14px; outline: none;
    }

    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; padding: 15px; }
    .channel-card { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #1a1a1a; }
    .channel-logo { height: 35px; max-width: 90%; object-fit: contain; margin-bottom: 5px; }
    .channel-name { font-size: 10px; color: #ccc; font-weight: 500; }

    .footer { padding: 30px 0 100px 0; text-align: center; }
    .dev-name { color: var(--primary); font-weight: bold; font-size: 14px; border-bottom: 2px solid var(--accent); padding-bottom: 2px; }

  </style>
</head>
<body>

<div id="top-section">
  <div class="brand-header"><div class="brand-title-new">AVIA TV</div></div>
  
  <div class="video-container" id="player-wrapper">
    <video id="v-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    <div id="brightness-overlay"></div>
    <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
    <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
  </div>

  <header>
    <div class="action-btns">
      <a href="https://t.me/techbd_group" class="rect-btn btn-tg"><i class="fab fa-telegram-plane"></i></a>
      <a href="https://www.mediafire.com/file/2c8yvb7c9dw2abz/Avia_Tv.apk/file" class="rect-btn btn-apk"><i class="fas fa-download"></i></a>
      <button onclick="shareApp()" class="rect-btn"><i class="fas fa-share-alt"></i></button>
      <button onclick="toggleFS()" class="rect-btn btn-rotate"><i class="fas fa-expand"></i></button>
    </div>
    
    <div class="search-row">
      <input type="text" id="search" placeholder="সার্চ চ্যানেল এখানে..." oninput="smartSearch()">
    </div>
  </header>
</div>

<div id="content-area" style="margin-top: 360px;">
  <div id="channelList">লোডিং হচ্ছে...</div>
  <div class="footer">
    <div id="online-status" style="font-size:11px; margin-bottom:10px; color:var(--apk)">Online...</div>
    <div style="font-size:9px; color:#555">DEVELOPED BY</div>
    <div class="dev-name">SOHEL TANVER</div>
  </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], player;

// ফুল স্ক্রিন জেস্টার কন্ট্রোল লজিক
let startY, startVal, isBrightness;
const wrapper = document.getElementById('player-wrapper');
const briOverlay = document.getElementById('brightness-overlay');
const volInd = document.getElementById('vol-indicator');
const briInd = document.getElementById('bri-indicator');

function initGestures() {
    wrapper.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        startY = touch.pageY;
        const rect = wrapper.getBoundingClientRect();
        isBrightness = touch.pageX - rect.left < rect.width / 2;
        startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : player.volume();
    }, { passive: false });

    wrapper.addEventListener('touchmove', (e) => {
        e.preventDefault(); 
        const touch = e.touches[0];
        const diff = (startY - touch.pageY) / 150;
        let newVal = Math.min(Math.max(startVal + diff, 0), 1);
        
        if (isBrightness) {
            briOverlay.style.opacity = 1 - newVal;
            briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
            briInd.style.display = 'block';
        } else {
            player.volume(newVal);
            volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
            volInd.style.display = 'block';
        }
    }, { passive: false });

    wrapper.addEventListener('touchend', () => {
        setTimeout(() => { 
            volInd.style.display = 'none'; 
            briInd.style.display = 'none'; 
        }, 1000);
    });
}

// স্মার্ট সার্চ ফাংশন
function smartSearch() {
  const query = document.getElementById("search").value.toLowerCase();
  const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
  renderChannels(filtered);
}

async function init() {
  player = videojs('v-player', { fluid: true });
  initGestures();
  
  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderChannels(allChannels);
    if(allChannels.length > 0) playStream(allChannels[0].url, allChannels[0].name);
  } catch(e) { console.log(e); }
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim();
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1];
    } else if (l.startsWith("http")) { 
      cur.url = l; 
      list.push({...cur}); 
      cur = {}; 
    }
  });
  return list;
}

function renderChannels(list) {
  const grid = document.getElementById("channelList");
  grid.innerHTML = list.map(ch => `
    <div class="channel-card" onclick="playStream('${ch.url}', '${ch.name}')">
      <img src="${ch.logo}" class="channel-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/50'">
      <div class="channel-name">${ch.name}</div>
    </div>`).join('');
}

function playStream(url, name) {
  player.src({ src: url, type: 'application/x-mpegURL' });
  player.play().catch(() => {});
}

function toggleFS() {
  if (!player.isFullscreen()) player.requestFullscreen();
  else player.exitFullscreen();
}

function shareApp() {
  if (navigator.share) navigator.share({ title: 'Avia TV', url: window.location.href });
  else alert("Link: " + window.location.href);
}

init();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  const firebaseConfig = { databaseURL: "https://avia-tv-default-rtdb.firebaseio.com/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const onlineRef = ref(db, 'online_users');
  const myRef = push(onlineRef);
  set(myRef, true);
  onDisconnect(myRef).remove();
  onValue(onlineRef, (s) => {
    const count = s.val() ? Object.keys(s.val()).length : 0;
    const el = document.getElementById("online-status");
    if(el) el.innerText = "Online Users: " + count;
  });
</script>
</body>
</html>
