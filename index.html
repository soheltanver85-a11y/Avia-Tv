<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Avia TV - Live TV Channels & Sports Online Free</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --focus: #00e5ff; --accent: #ff4081; --star: #ffd700; 
      --tg: #24A1DE; --apk: #3DDC84; --online: #4CAF50;
      --refresh: #ffa500;
    }

    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      background: var(--bg); font-family: 'Segoe UI', sans-serif; 
      overflow-x: hidden; overflow-y: auto; 
    }

    .vjs-fullscreen #brand-header, .vjs-fullscreen #ticker, .vjs-fullscreen header, .vjs-fullscreen #content-area { display: none !important; }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #222; }
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; max-width: 1200px; margin: 0 auto; background: #000; overflow: hidden; }
    .video-js { width: 100% !important; height: 100% !important; cursor: pointer; }
    
    #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 1; }
    
    .gesture-indicator { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.8); color: var(--primary); padding: 12px 20px; border-radius: 30px; font-size: 16px; font-weight: bold; z-index: 100; display: none; pointer-events: none; border: 1px solid var(--primary); }
    #vol-indicator { right: 20px; }
    #bri-indicator { left: 20px; }

    .vjs-loading-spinner { display: none !important; }
    .manual-loading .vjs-loading-spinner { display: block !important; }

    .brand-header { padding: 12px 15px; background: #111; display: flex; align-items: center; }
    .brand-title-new { font-size: 26px; font-weight: 900; color: var(--primary); letter-spacing: 1.5px; }

    #ticker { background: #001a1a; color: #fff; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--primary); overflow: hidden; }
    .ticker-content { display: inline-block; animation: marquee 20s linear infinite; white-space: nowrap; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    
    header { padding: 10px 12px; background: #111; }
    
    .action-btns { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; width: 100%; justify-content: space-between; }
    .rect-btn { flex: 1; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 18px; outline: none; transition: 0.2s; }
    
    .btn-refresh { color: var(--refresh); background: rgba(255, 165, 0, 0.1); border-color: var(--refresh); }
    .btn-tg { color: var(--tg); background: rgba(36, 161, 222, 0.1); border-color: var(--tg); }
    .btn-apk { color: var(--apk); background: rgba(61, 220, 132, 0.1); border-color: var(--apk); }
    .btn-share { color: #fff; background: rgba(255, 255, 255, 0.05); }
    .btn-rotate { color: #fff; background: var(--accent); border: 1px solid var(--accent); font-weight: bold; }

    .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    #search { flex: 1; background:#1a1a1a; border:1px solid #333; color:white; padding: 8px; border-radius: 6px; font-size: 13px; outline: none; }
    #count { font-size: 10px; color: var(--primary); font-weight: bold; background: rgba(0, 229, 255, 0.1); padding: 4px 8px; border-radius: 4px; }

    .tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { padding: 6px 14px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 5px; font-size: 11px; cursor: pointer; }
    .tab-btn.active { background: var(--accent); color: white; }

    #content-area { position: relative; z-index: 1; width: 100%; display: block; }
    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 12px; padding: 15px; }
    .channel-card { background: var(--card); border-radius: 12px; padding: 15px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.05); min-height: 90px; cursor: pointer; position: relative; }
    .fav-star { position: absolute; top: 6px; right: 8px; font-size: 20px; color: rgba(255,255,255,0.2); z-index: 10; padding: 5px; }
    .fav-star.active { color: var(--star); }
    .channel-logo { height: 35px; object-fit: contain; margin-bottom: 8px; pointer-events: none; }
    .channel-name { font-size: 10px; color: #ccc; pointer-events: none; }

    .footer-area { padding: 40px 0 80px 0; text-align: center; }
    #online-status { font-size: 11px; color: var(--online); font-weight: bold; background: rgba(76, 175, 80, 0.1); padding: 5px 15px; border-radius: 50px; display: inline-flex; align-items: center; gap: 5px; border: 1px solid rgba(76, 175, 80, 0.2); }
  </style>
</head>
<body id="main-body">

<div id="top-section">
  <div id="brand-header" class="brand-header"><div class="brand-title-new">AVIA TV</div></div>
  <div id="ticker">
    <div class="ticker-content">
      <span id="now-playing-text" style="color: var(--primary); font-weight: bold;">চ্যানেল নির্বাচন করুন...</span>
      <span style="margin-left: 20px;">📢 পরামর্শ বা অভিযোগের জন্য: </span>
      <a href="https://t.me/techbd_group" target="_blank" style="color:#24A1DE; font-weight:bold; text-decoration:none;">TECH BD GROUP</a>
    </div>
  </div>

  <div class="video-container" id="player-wrapper">
    <video id="v-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    <div id="brightness-overlay"></div>
    <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
    <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
  </div>

  <header id="main-header">
    <div class="action-btns">
      <button onclick="refreshPlayer()" class="rect-btn btn-refresh" title="Refresh Player"><i class="fa-solid fa-rotate-right"></i></button>
      <a href="https://t.me/techbd_group" target="_blank" class="rect-btn btn-tg"><i class="fa-brands fa-telegram"></i></a>
      <a href="https://www.mediafire.com/file/mkby3e9skeyfz8n/Avia+Tv+1.0.0.apk/file" target="_blank" class="rect-btn btn-apk"><i class="fa-solid fa-download"></i></a>
      <button onclick="shareApp()" class="rect-btn btn-share"><i class="fa-solid fa-share-nodes"></i></button>
      <button onclick="toggleRotateManual()" class="rect-btn btn-rotate"><i class="fa-solid fa-expand"></i></button>
    </div>
    
    <div class="search-row">
      <input type="text" id="search" placeholder="সার্চ চ্যানেল (যেমন: Sports)...">
      <span id="count">0 CH</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
      <button class="tab-btn" onclick="filterCat('sports', this)">Sports</button>
      <button class="tab-btn" onclick="filterCat('bangla', this)">Bangla</button>
      <button class="tab-btn" style="color:var(--star)" onclick="filterCat('fav', this)">★ Fav</button>
    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
  <div class="footer-area">
    <div id="online-status">Online: 0</div>
    <div style="color:#555; font-size:11px; margin-top:10px;">DEVELOPED BY SOHEL TANVER</div>
  </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let currentCategory = 'all';
let player;
let currentUrl = "";
let currentName = "";

function refreshPlayer() {
  if(currentUrl) playStream(currentUrl, currentName, "", false, true);
  else location.reload();
}

async function toggleRotateManual() {
  if (!player) return;
  if (!player.isFullscreen()) {
    player.requestFullscreen();
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  } else {
    player.exitFullscreen();
  }
}

document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase().trim();
  if (val === "") {
    filterCat(currentCategory, document.querySelector('.tab-btn.active'));
    return;
  }
  const filtered = allChannels.filter(ch => ch.name && ch.name.toLowerCase().includes(val));
  renderChannels(filtered);
});

function filterCat(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById("search").value = "";
  
  if (cat === 'all') {
    renderChannels(allChannels);
  } else if (cat === 'fav') {
    renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
  } else {
    renderChannels(allChannels.filter(ch => ch.name && ch.name.toLowerCase().includes(cat.toLowerCase())));
  }
}

function toggleFav(event, id) {
  event.stopPropagation();
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('myFavs', JSON.stringify(favorites));
  event.target.classList.toggle('active');
  
  if (currentCategory === 'fav') {
    renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
  }
}

let startY, startVal, isBrightness, isMoving = false;
const wrapper = document.getElementById('player-wrapper');
const briOverlay = document.getElementById('brightness-overlay');
const volInd = document.getElementById('vol-indicator');
const briInd = document.getElementById('bri-indicator');

async function init() {
  // Video.js Initialization with click action enabled
  player = videojs('v-player', { 
    fluid: true,
    userActions: {
      click: false // We will handle custom click logic for sync
    }
  });

  player.on('playing', () => player.removeClass('manual-loading'));

  // Syncing Click-to-Pause and Gesture Controls
  wrapper.addEventListener('touchstart', (e) => {
    isMoving = false; 
    startY = e.touches[0].pageY;
    const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
    isBrightness = x < wrapper.offsetWidth / 2;
    startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : player.volume();
  });

  wrapper.addEventListener('touchmove', (e) => {
    isMoving = true; 
    const diff = (startY - e.touches[0].pageY) / 150;
    let newVal = Math.min(Math.max(startVal + diff, 0), 1);
    if (isBrightness) {
      briOverlay.style.opacity = 1 - newVal;
      briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
      briInd.style.display = 'block';
    } else {
      player.volume(newVal);
      volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
      volInd.style.display = 'block';
    }
  });

  wrapper.addEventListener('touchend', (e) => {
    // If no movement occurred, treat as a toggle click
    if (!isMoving) {
        if (player.paused()) player.play();
        else player.pause();
    }
    setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
  });

  // Desktop Mouse Click Handler
  player.on('mousedown', function(e) {
    if (e.target.nodeName === 'VIDEO' || e.target.classList.contains('vjs-tech')) {
        if (player.paused()) player.play();
        else player.pause();
    }
  });

  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderChannels(allChannels);
    setInterval(() => {
      document.getElementById("content-area").style.marginTop = document.getElementById('top-section').offsetHeight + 'px';
    }, 1000);
    if(allChannels.length > 0) playStream(allChannels[0].url, allChannels[0].name, allChannels[0].logo, false, false);
  } catch(e) { console.error(e); }
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim();
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1];
      cur.id = btoa(unescape(encodeURIComponent(cur.name || "")));
    } else if (l.startsWith("http")) { 
      cur.url = l.trim(); 
      if(cur.name) list.push({...cur}); 
      cur = {}; 
    }
  });
  return list;
}

function renderChannels(list) {
  const grid = document.getElementById("channelList");
  grid.innerHTML = list.length === 0 ? "<div style='grid-column:1/-1; color:gray; padding:20px; text-align:center;'>কোনো চ্যানেল পাওয়া যায়নি</div>" : 
    list.map(ch => `<div class="channel-card" onclick="playStream('${ch.url}', '${ch.name}', '${ch.logo}', true, true)">
      <span class="fav-star ${favorites.includes(ch.id) ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
      <img src="${ch.logo}" class="channel-logo" loading="lazy">
      <div class="channel-name">${ch.name}</div>
    </div>`).join('');
  document.getElementById("count").textContent = list.length + " CH";
}

function playStream(url, name, logo, updateRecent, showSpinner) {
  currentUrl = url;
  currentName = name;
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name;
  if (showSpinner) player.addClass('manual-loading');
  player.src({ src: url, type: 'application/x-mpegURL' });
  player.play().catch(() => {});
}

function shareApp() {
  if (navigator.share) navigator.share({ title: 'Avia Tv', url: window.location.href });
  else alert("লিংক: " + window.location.href);
}

init();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  const firebaseConfig = { databaseURL: "https://avia-tv-default-rtdb.firebaseio.com/" };
  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const onlineRef = ref(db, 'online_users');
    const myRef = push(onlineRef);
    set(myRef, true);
    onDisconnect(myRef).remove();
    onValue(onlineRef, (s) => {
      const count = s.val() ? Object.keys(s.val()).length : 0;
      document.getElementById("online-status").innerText = "Online: " + count;
    });
  } catch (e) {}
</script>
</body>
</html>
