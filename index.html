<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Avia TV - Fixed Version</title>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  
  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --accent: #ff4081; 
    }

    /* রিফ্রেশ সমস্যা সমাধানের জন্য এই লাইনটি গুরুত্বপূর্ণ */
    html, body { 
        margin: 0; padding: 0; background: var(--bg); 
        font-family: 'Segoe UI', sans-serif; color: white; 
        overflow-y: auto;
        overscroll-behavior-y: contain; /* ভলিউম কমানোর সময় রিফ্রেশ হওয়া বন্ধ করবে */
        height: 100%;
    }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #222; }
    .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; touch-action: none; /* টাচ ইন্টারফেয়ারেন্স বন্ধ করবে */ }
    .video-js { width: 100% !important; height: 100% !important; }

    header { padding: 8px 12px; background: #111; }
    .search-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
    #search-input { 
        flex: 1; background:#1a1a1a; border:1px solid #333; 
        color:white; padding: 10px 12px; border-radius: 8px; outline: none; 
    }

    #content-area { padding-top: 330px; }
    #channelList { 
        display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
        gap: 10px; padding: 15px; 
    }

    .channel-card { 
        background: var(--card); border-radius: 12px; padding: 10px; 
        text-align: center; border: 1px solid #333; cursor: pointer;
    }
    .channel-logo { width: 50px; height: 40px; object-fit: contain; }
    .channel-name { font-size: 11px; margin-top: 5px; white-space: nowrap; overflow: hidden; }

    /* Gesture Indicators */
    .gesture-indicator {
      position: absolute; top: 50%; transform: translateY(-50%);
      padding: 8px 15px; background: rgba(0,0,0,0.8); border-radius: 20px;
      display: none; pointer-events: none; z-index: 2000; color: var(--primary);
    }
    #volume-status { right: 20px; }
    #brightness-status { left: 20px; }
    #brightness-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 9999; opacity: 0; }
  </style>
</head>
<body>

<div id="brightness-overlay"></div>

<div id="top-section">
  <div class="video-container" id="player-wrapper">
    <video id="my-video" class="video-js vjs-big-play-centered" controls playsinline preload="auto"></video>
    <div id="brightness-status" class="gesture-indicator">☀️ 100%</div>
    <div id="volume-status" class="gesture-indicator">🔊 100%</div>
  </div>

  <header>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="চ্যানেল খুঁজুন (যেমন: T Sports)..." oninput="doSearch()">
    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [];
let player = videojs('my-video');

// ১. সার্চ ফাংশন ঠিক করা হয়েছে
function doSearch() {
    const query = document.getElementById("search-input").value.toLowerCase();
    const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
    renderChannels(filtered);
}

// ২. চ্যানেল রেন্ডার ফাংশন
function renderChannels(list) {
    const container = document.getElementById("channelList");
    if(list.length === 0) {
        container.innerHTML = "<p style='text-align:center'>কিছু পাওয়া যায়নি!</p>";
        return;
    }
    container.innerHTML = list.map(ch => `
        <div class="channel-card" onclick="playChannel('${ch.url}', '${ch.name}')">
            <img src="${ch.logo}" class="channel-logo" onerror="this.src='https://via.placeholder.com/50'">
            <div class="channel-name">${ch.name}</div>
        </div>
    `).join('');
}

// ৩. সাউন্ড অন রেখে প্লে করা
function playChannel(url, name) {
    player.src({ type: 'application/x-mpegURL', src: url });
    player.muted(false); // সাউন্ড অন থাকবে
    player.volume(1.0);
    player.play().catch(() => {
        // ব্রাউজার ব্লক করলে মিউট করে প্লে করার ব্যাকআপ
        player.muted(true);
        player.play();
    });
}

// ৪. ভলিউম এবং ব্রাইটনেস জেসচার (রিফ্রেশ সমস্যা ছাড়া)
const playerWrapper = document.getElementById('player-wrapper');
let startY, isRight;

playerWrapper.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    isRight = e.touches[0].clientX > (window.innerWidth / 2);
}, {passive: false});

playerWrapper.addEventListener('touchmove', e => {
    e.preventDefault(); // স্ক্রিন স্ক্রল বা রিফ্রেশ হওয়া আটকাবে
    const currentY = e.touches[0].clientY;
    const diffY = startY - currentY;

    if (isRight) {
        let newVol = Math.max(0, Math.min(1, player.volume() + (diffY * 0.002)));
        player.volume(newVol);
        showInd('volume-status', `🔊 ${Math.round(newVol * 100)}%`);
    } else {
        let currentOpacity = parseFloat(document.getElementById('brightness-overlay').style.opacity) || 0;
        let newOpacity = Math.max(0, Math.min(0.8, currentOpacity - (diffY * 0.002)));
        document.getElementById('brightness-overlay').style.opacity = newOpacity;
        showInd('brightness-status', `☀️ ${Math.round((1 - newOpacity) * 100)}%`);
    }
    startY = currentY;
}, {passive: false});

function showInd(id, text) {
    const el = document.getElementById(id);
    el.innerText = text; el.style.display = 'block';
    clearTimeout(el.timer);
    el.timer = setTimeout(() => el.style.display = 'none', 800);
}

// ৫. ডেটা লোড
async function init() {
    try {
        const res = await fetch(playlistUrl);
        const data = await res.text();
        allChannels = parseM3U(data);
        renderChannels(allChannels);
    } catch(e) { console.error("Error loading M3U"); }
}

function parseM3U(data) {
    const list = [];
    let cur = {};
    data.split("\n").forEach(l => {
        if (l.startsWith("#EXTINF")) {
            cur.name = l.split(",")[1]?.trim();
            cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1] || "";
        } else if (l.startsWith("http")) { 
            cur.url = l.trim(); 
            list.push({...cur}); 
            cur = {}; 
        }
    });
    return list;
}

init();
</script>
</body>
</html>
