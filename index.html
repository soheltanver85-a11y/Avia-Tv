<!DOCTYPE html>
<html lang="bn">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99V1DXBKKT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

  <script src="https://pl28744070.effectivegatecpm.com/d0/6e/79/d06e79767e37c835c1f36cc898ad6320.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Avia TV - MX Player Experience</title>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --focus: #00e5ff; --accent: #ff4081; --star: #ffd700; 
      --tg: #24A1DE; --apk: #3DDC84; --online: #4CAF50;
    }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: sans-serif; overflow-x: hidden; }
    
    /* ফুলস্ক্রিন হলে সব হাইড হবে */
    .vjs-fullscreen #top-section, .vjs-fullscreen #content-area { display: none !important; }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #222; }
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; z-index: 1001; }
    .video-js { width: 100% !important; height: 100% !important; }

    /* ব্রাইটনেস ওভারলে এবং ইন্ডিকেটর - এটি প্লেয়ারের ভেতরে থাকবে */
    #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 10; }
    .gesture-indicator { 
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.8); color: var(--primary); padding: 12px 20px;
      border-radius: 30px; font-size: 18px; font-weight: bold;
      z-index: 20; display: none; pointer-events: none; border: 1px solid var(--primary);
    }
    #vol-indicator { right: 30px; }
    #bri-indicator { left: 30px; }

    /* লোডিং স্পিনার */
    .vjs-loading-spinner { display: none !important; }
    .manual-loading .vjs-loading-spinner { display: block !important; }

    .brand-header { padding: 12px 15px; display: flex; align-items: center; }
    .brand-title-new { font-size: 26px; font-weight: 900; color: var(--primary); letter-spacing: 1.5px; }
    #ticker { background: #001a1a; color: #fff; padding: 5px 0; font-size: 12px; border-top: 1px solid #222; border-bottom: 1px solid var(--primary); overflow: hidden; }
    .ticker-content { display: inline-block; animation: marquee 20s linear infinite; white-space: nowrap; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    
    header { padding: 8px 12px; background: #111; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    #recent-list { flex: 1; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .recent-item { min-width: 32px; height: 32px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; cursor: pointer; }
    .recent-item img { width: 75%; height: 75%; object-fit: contain; }

    .search-row { display: flex; gap: 8px; margin-bottom: 8px; }
    #search { flex: 1; background:#1a1a1a; border:1px solid #333; color:white; padding: 8px; border-radius: 6px; outline: none; }
    .tabs { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { padding: 6px 12px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 5px; font-size: 12px; cursor: pointer; }
    .tab-btn.active { background: var(--accent); color: white; }

    #content-area { padding-top: 10px; }
    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; padding: 15px; }
    .channel-card { background: var(--card); border-radius: 12px; padding: 15px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
    .channel-logo { height: 40px; object-fit: contain; margin-bottom: 8px; }
    .channel-name { font-size: 10px; color: #ccc; }
    .footer-area { padding: 40px 0; text-align: center; color: #555; font-size: 11px; }
  </style>
</head>
<body>

<div id="top-section">
  <div class="brand-header"><div class="brand-title-new">AVIA TV</div></div>
  <div id="ticker">
    <div class="ticker-content">
      <span id="now-playing-text" style="color: var(--primary); font-weight: bold;">চ্যানেল নির্বাচন করুন...</span>
      <span style="margin-left: 20px;">📢 পরামর্শ বা অভিযোগের জন্য এখানে ক্লিক করুন: </span>
      <a href="https://t.me/techbd_group" target="_blank" style="color:#24A1DE; font-weight:bold;">TECH BD GROUP</a>
    </div>
  </div>

  <div class="video-container" id="player-wrapper">
    <video id="v-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    <div id="brightness-overlay"></div>
    <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
    <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
  </div>

  <header>
    <div class="header-top"><div id="recent-list"></div></div>
    <div class="search-row"><input type="text" id="search" placeholder="সার্চ চ্যানেল..."></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
      <button class="tab-btn" onclick="filterCat('sports', this)">Sports</button>
      <button class="tab-btn" onclick="filterCat('bangla', this)">Bangla</button>
      <button class="tab-btn" onclick="filterCat('fav', this)">★ Fav</button>
    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
  <div class="footer-area">BY SOHEL TANVER</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], player;
let startY, startVal, isBrightness;

const wrapper = document.getElementById('player-wrapper');
const briOverlay = document.getElementById('brightness-overlay');
const volInd = document.getElementById('vol-indicator');
const briInd = document.getElementById('bri-indicator');

// ১. অটো-রোটেট ফিক্স
window.addEventListener("orientationchange", function() {
  if (Math.abs(window.orientation) === 90) {
    if (player && !player.isFullscreen()) player.requestFullscreen();
  }
});

async function init() {
  player = videojs('v-player', { fluid: true });
  
  player.on('playing', () => player.removeClass('manual-loading'));

  // ২. ফুলস্ক্রিন ও নরমাল উভয় মোডে জেশ্চার কন্ট্রোল ফিক্স
  const handleTouchStart = (e) => {
    startY = e.touches[0].pageY;
    const rect = wrapper.getBoundingClientRect();
    const x = e.touches[0].pageX - rect.left;
    isBrightness = x < rect.width / 2;
    startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : player.volume();
  };

  const handleTouchMove = (e) => {
    if (e.touches.length > 1) return;
    const currentY = e.touches[0].pageY;
    const diff = (startY - currentY) / 200; 
    let newVal = Math.min(Math.max(startVal + diff, 0), 1);

    if (isBrightness) {
      briOverlay.style.opacity = 1 - newVal;
      briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
      briInd.style.display = 'block';
      volInd.style.display = 'none';
    } else {
      player.volume(newVal);
      volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
      volInd.style.display = 'block';
      briInd.style.display = 'none';
    }
  };

  const handleTouchEnd = () => {
    setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
  };

  // ইভেন্ট লিসেনারগুলো যুক্ত করা
  wrapper.addEventListener('touchstart', handleTouchStart, {passive: false});
  wrapper.addEventListener('touchmove', handleTouchMove, {passive: false});
  wrapper.addEventListener('touchend', handleTouchEnd);

  // প্লেয়ারের ভেতরেও এলিমেন্টগুলো মুভ করা (ফুলস্ক্রিন ফিক্স)
  player.on('fullscreenchange', () => {
    const el = player.el();
    el.appendChild(briOverlay);
    el.appendChild(briInd);
    el.appendChild(volInd);
    adjustLayout();
  });

  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderChannels(allChannels);
    adjustLayout();
    if(allChannels.length > 0) playStream(allChannels[0].url, allChannels[0].name, allChannels[0].logo, false);
  } catch(e) { }
}

function adjustLayout() {
  const topH = document.getElementById('top-section').offsetHeight;
  document.getElementById("content-area").style.marginTop = topH + 'px';
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim();
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1];
      cur.cat = (l.match(/group-title="([^"]+)"/)?.[1] || "").toLowerCase();
    } else if (l.startsWith("http")) { cur.url = l; list.push({...cur}); cur = {}; }
  });
  return list;
}

function renderChannels(list) {
  const grid = document.getElementById("channelList");
  grid.innerHTML = list.map(ch => `
    <div class="channel-card" onclick="playStream('${ch.url}', '${ch.name}', '${ch.logo}', true)">
      <img src="${ch.logo}" class="channel-logo" loading="lazy">
      <div class="channel-name">${ch.name}</div>
    </div>
  `).join('');
}

function playStream(url, name, logo, manual = true) {
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name;
  if (manual) player.addClass('manual-loading');
  player.src({ src: url, type: 'application/x-mpegURL' });
  player.play();
}

init();
</script>
</body>
</html>
