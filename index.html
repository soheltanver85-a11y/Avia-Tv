<!DOCTYPE html>
<html lang="bn">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99V1DXBKKT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-99V1DXBKKT');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Avia TV - Live TV</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root { 
      --primary: #00e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); 
      --accent: #ff4081; --star: #ffd700; --tg: #24A1DE; --apk: #3DDC84; 
    }

    html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: #fff; overflow-x: hidden; }

    /* ১. ব্র্যান্ডিং - বামে এবং ছোট ইউনিক ডিজাইন */
    .brand-header { padding: 10px 15px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; }
    .brand-title-new { 
      font-size: 16px; font-weight: 900; 
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-left: 3px solid var(--accent);
      padding-left: 8px;
    }

    #top-section { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: #111; }
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
    .video-js { width: 100% !important; height: 100% !important; }

    /* লোডিং স্পিনার ফিক্স */
    .vjs-loading-spinner { border: 3px solid rgba(0, 229, 255, 0.3) !important; width: 40px !important; height: 40px !important; border-radius: 50% !important; }

    /* জেস্টার ইনডিকেটর */
    #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 1; }
    .gesture-indicator { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.8); color: var(--primary); padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; z-index: 100; display: none; pointer-events: none; border: 1px solid var(--primary); }
    #vol-indicator { right: 20px; }
    #bri-indicator { left: 20px; }

    #ticker { background: #051010; padding: 4px 0; font-size: 10px; border-bottom: 1px solid #222; overflow: hidden; }
    .ticker-content { display: inline-block; animation: marquee 20s linear infinite; white-space: nowrap; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    header { padding: 10px; background: #111; }

    /* চ্যাপ্টা আকৃতির বাটন */
    .action-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
    .rect-btn { 
      height: 38px; border-radius: 5px; display: flex; align-items: center; justify-content: center; 
      text-decoration: none; border: 1px solid rgba(255,255,255,0.05); font-size: 15px; transition: 0.3s; color: #fff;
    }
    .btn-tg { background: var(--tg); }
    .btn-apk { background: var(--apk); }
    .btn-share { background: rgba(255,255,255,0.1); }
    .btn-rotate { background: var(--accent); }

    /* স্মার্ট সার্চ */
    .search-row { position: relative; margin-bottom: 10px; }
    #search { 
      width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; 
      padding: 9px 40px 9px 12px; border-radius: 6px; font-size: 13px; outline: none; box-sizing: border-box;
    }
    #search:focus { border-color: var(--primary); }
    .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #666; font-size: 12px; }

    .tabs { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; margin-bottom: 5px; }
    .tab-btn { padding: 6px 14px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; }
    .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; }

    #channelList { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; padding: 10px; }
    .channel-card { background: var(--card); border-radius: 8px; padding: 10px 4px; text-align: center; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; position: relative; }
    .fav-star { position: absolute; top: 4px; right: 4px; font-size: 14px; color: rgba(255,255,255,0.15); }
    .fav-star.active { color: var(--star); }
    .channel-logo { height: 32px; max-width: 80%; object-fit: contain; margin-bottom: 5px; }
    .channel-name { font-size: 9px; color: #bbb; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* ফুটার ডিজাইন */
    .footer-area { padding: 25px 0 90px 0; text-align: center; }
    .dev-tag { font-size: 9px; color: #555; letter-spacing: 1px; margin-bottom: 5px; }
    .dev-name { font-size: 12px; font-weight: bold; color: var(--primary); display: inline-block; border-bottom: 1px solid var(--accent); padding-bottom: 2px; }

    .vjs-fullscreen #brand-header, .vjs-fullscreen #ticker, .vjs-fullscreen header, .vjs-fullscreen #content-area { display: none !important; }
  </style>
</head>
<body>

<div id="top-section">
  <div id="brand-header" class="brand-header"><div class="brand-title-new">AVIA TV</div></div>
  <div id="ticker">
    <div class="ticker-content">
      <span id="now-playing-text" style="color: var(--primary);">চ্যানেল নির্বাচন করুন...</span>
      <span style="margin-left: 20px;">📢 টেলিগ্রাম গ্রুপ: </span>
      <a href="https://t.me/techbd_group" target="_blank" style="color:#24A1DE; text-decoration:none;">TECH BD GROUP</a>
    </div>
  </div>

  <div class="video-container" id="player-wrapper">
    <video id="v-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    <div id="brightness-overlay"></div>
    <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
    <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
  </div>

  <header>
    <div class="action-btns">
      <a href="https://t.me/techbd_group" target="_blank" class="rect-btn btn-tg"><i class="fab fa-telegram-plane"></i></a>
      <a href="https://www.mediafire.com/file/2c8yvb7c9dw2abz/Avia_Tv.apk/file" target="_blank" class="rect-btn btn-apk"><i class="fas fa-download"></i></a>
      <button onclick="shareApp()" class="rect-btn btn-share"><i class="fas fa-share-alt"></i></button>
      <button onclick="toggleRotateManual()" class="rect-btn btn-rotate"><i class="fas fa-sync-alt"></i></button>
    </div>
    
    <div class="search-row">
      <input type="text" id="search" placeholder="খুঁজুন এখানে..." oninput="smartSearch()">
      <i class="fas fa-search search-icon"></i>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="filterCat('all', this)">All</button>
      <button class="tab-btn" onclick="filterCat('sports', this)">Sports</button>
      <button class="tab-btn" onclick="filterCat('bangla', this)">Bangla</button>
      <button class="tab-btn" onclick="filterCat('fav', this)">★ Fav</button>
    </div>
  </header>
</div>

<div id="content-area">
  <div id="channelList">লোডিং...</div>
  <div class="footer-area">
    <div id="online-status" style="font-size:10px; margin-bottom:15px; color:var(--online)">Online...</div>
    <div class="dev-tag">DEVELOPED BY</div>
    <div class="dev-name">SOHEL TANVER</div>
  </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let player;

// জেস্টার কন্ট্রোল
let startY, startVal, isBrightness;
const wrapper = document.getElementById('player-wrapper');
const briOverlay = document.getElementById('brightness-overlay');
const volInd = document.getElementById('vol-indicator');
const briInd = document.getElementById('bri-indicator');

function initGestures() {
    wrapper.addEventListener('touchstart', (e) => {
        startY = e.touches[0].pageY;
        const rect = wrapper.getBoundingClientRect();
        isBrightness = e.touches[0].pageX - rect.left < rect.width / 2;
        startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : player.volume();
    });
    wrapper.addEventListener('touchmove', (e) => {
        const diff = (startY - e.touches[0].pageY) / 150;
        let newVal = Math.min(Math.max(startVal + diff, 0), 1);
        if (isBrightness) {
            briOverlay.style.opacity = 1 - newVal;
            briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
            briInd.style.display = 'block';
        } else {
            player.volume(newVal);
            volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
            volInd.style.display = 'block';
        }
    });
    wrapper.addEventListener('touchend', () => {
        setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
    });
}

function smartSearch() {
  const query = document.getElementById("search").value.toLowerCase();
  const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
  renderChannels(filtered);
}

async function init() {
  player = videojs('v-player', { fluid: true });
  initGestures();
  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderChannels(allChannels);
    adjustLayout();
    if(allChannels.length > 0) playStream(allChannels[0].url, allChannels[0].name);
  } catch(e) {}
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim();
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1];
      cur.id = btoa(unescape(encodeURIComponent(cur.name)));
    } else if (l.startsWith("http")) { cur.url = l; list.push({...cur}); cur = {}; }
  });
  return list;
}

function renderChannels(list) {
  const grid = document.getElementById("channelList");
  grid.innerHTML = list.map(ch => {
    const isFav = favorites.includes(ch.id);
    return `<div class="channel-card" onclick="playStream('${ch.url}', '${ch.name}')">
      <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
      <img src="${ch.logo}" class="channel-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/50x30?text=TV'">
      <div class="channel-name">${ch.name}</div>
    </div>`;
  }).join('');
}

function playStream(url, name) {
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name;
  player.src({ src: url, type: 'application/x-mpegURL' });
  player.play().catch(() => {});
}

async function toggleRotateManual() {
  if (!player.isFullscreen()) {
    await player.requestFullscreen();
    if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(() => {});
  } else {
    await player.exitFullscreen();
  }
}

function filterCat(type, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(type === 'all') renderChannels(allChannels);
    else if(type === 'fav') renderChannels(allChannels.filter(c => favorites.includes(c.id)));
    else renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(type)));
}

function toggleFav(event, id) {
  event.stopPropagation();
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('myFavs', JSON.stringify(favorites));
  event.target.classList.toggle('active');
}

function adjustLayout() {
  const topH = document.getElementById('top-section').offsetHeight;
  document.getElementById("content-area").style.marginTop = topH + 'px';
}

function shareApp() {
  if (navigator.share) navigator.share({ title: 'Avia TV', url: window.location.href });
  else { navigator.clipboard.writeText(window.location.href); alert("লিঙ্ক কপি হয়েছে!"); }
}

init();
window.addEventListener('resize', adjustLayout);
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  const firebaseConfig = { databaseURL: "https://avia-tv-default-rtdb.firebaseio.com/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const onlineRef = ref(db, 'online_users');
  const myRef = push(onlineRef);
  set(myRef, true);
  onDisconnect(myRef).remove();
  onValue(onlineRef, (s) => {
    const count = s.val() ? Object.keys(s.val()).length : 0;
    document.getElementById("online-status").innerText = "Online Users: " + count;
  });
</script>

</body>
</html>
