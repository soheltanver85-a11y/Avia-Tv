<script>
const playlistUrl = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/main/Live%20tv";
let allChannels = [], favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
let recentChannels = JSON.parse(localStorage.getItem('recentCh')) || [];
let player;

// --- 🔎 Smart Live Search Logic ---
document.getElementById("search").addEventListener("input", function() {
  const searchValue = this.value.toLowerCase().trim();

  if (!searchValue) {
    renderChannels(allChannels);
    return;
  }

  const filteredChannels = allChannels.filter(channel =>
    channel.name && channel.name.toLowerCase().includes(searchValue)
  );

  renderChannels(filteredChannels);
});

// --- ওরিয়েন্টেশন এবং রোটেট লজিক ---
window.screen.orientation.addEventListener('change', function() {
  if (window.screen.orientation.type.startsWith('landscape')) {
    if (player && !player.isFullscreen()) player.requestFullscreen().catch(() => {});
  } else if (window.screen.orientation.type.startsWith('portrait')) {
    if (player && player.isFullscreen()) player.exitFullscreen().catch(() => {});
  }
});

async function toggleRotateManual() {
  if (!player) return;
  try {
    if (!player.isFullscreen()) {
      await player.requestFullscreen();
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock('landscape').catch(() => {});
      }
    } else {
      await player.exitFullscreen();
    }
  } catch (err) { console.error("Rotate Error: ", err); }
}

// --- প্লেয়ার ইনিশিয়ালাইজেশন ---
let startY, startVal, isBrightness;
const wrapper = document.getElementById('player-wrapper');
const briOverlay = document.getElementById('brightness-overlay');
const volInd = document.getElementById('vol-indicator');
const briInd = document.getElementById('bri-indicator');

async function init() {
  player = videojs('v-player', { 
    fluid: true,
    html5: { vhs: { overrideNative: true }, nativeAudioTracks: false, nativeVideoTracks: false }
  });
  
  player.on('playing', () => player.removeClass('manual-loading'));

  player.on('fullscreenchange', () => {
    const el = player.el();
    el.appendChild(briOverlay);
    el.appendChild(briInd);
    el.appendChild(volInd);
    adjustLayout();
    if (!player.isFullscreen() && screen.orientation && screen.orientation.unlock) {
      screen.orientation.unlock().catch(() => {});
    }
  });

  const handleTouchStart = (e) => {
    startY = e.touches[0].pageY;
    const rect = wrapper.getBoundingClientRect();
    const x = e.touches[0].pageX - rect.left;
    isBrightness = x < rect.width / 2;
    startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : player.volume();
  };

  const handleTouchMove = (e) => {
    if (e.touches.length > 1) return;
    const currentY = e.touches[0].pageY;
    const diff = (startY - currentY) / 180; 
    let newVal = Math.min(Math.max(startVal + diff, 0), 1);
    if (isBrightness) {
      briOverlay.style.opacity = 1 - newVal;
      briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
      briInd.style.display = 'block';
    } else {
      player.volume(newVal);
      volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
      volInd.style.display = 'block';
    }
  };

  wrapper.addEventListener('touchstart', handleTouchStart);
  wrapper.addEventListener('touchmove', handleTouchMove);
  wrapper.addEventListener('touchend', () => {
    setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
  });

  try {
    const res = await fetch(playlistUrl);
    const data = await res.text();
    allChannels = parseM3U(data);
    renderChannels(allChannels);
    renderRecent();
    
    // হাইট অ্যাডজাস্ট করার জন্য বারবার চেক করা
    setInterval(adjustLayout, 1000); 
    adjustLayout();

    if(allChannels.length > 0) playStream(allChannels[0].url, allChannels[0].name, allChannels[0].logo, false, false);
  } catch(e) { console.error("Fetch Error:", e); }
}

function adjustLayout() {
  const topH = document.getElementById('top-section').offsetHeight;
  document.getElementById("content-area").style.marginTop = topH + 'px';
}

function parseM3U(data) {
  const lines = data.split("\n"), list = [];
  let cur = {};
  lines.forEach(l => {
    l = l.trim();
    if (l.startsWith("#EXTINF")) {
      cur.name = l.split(",")[1]?.trim();
      cur.logo = l.match(/tvg-logo="([^"]+)"/)?.[1];
      cur.id = btoa(unescape(encodeURIComponent(cur.name)));
    } else if (l.startsWith("http")) { cur.url = l; list.push({...cur}); cur = {}; }
  });
  return list;
}

function renderChannels(list) {
  const grid = document.getElementById("channelList");
  if(list.length === 0) {
    grid.innerHTML = "<div style='color:gray; padding:20px; text-align:center; grid-column: 1/-1;'>কোনো চ্যানেল খুঁজে পাওয়া যায়নি!</div>";
  } else {
    grid.innerHTML = list.map(ch => {
      const isFav = favorites.includes(ch.id);
      return `<div class="channel-card" onclick="playStream('${ch.url}', '${ch.name}', '${ch.logo}', true, true)">
        <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${ch.id}')">★</span>
        <img src="${ch.logo}" class="channel-logo" loading="lazy">
        <div class="channel-name">${ch.name}</div>
      </div>`;
    }).join('');
  }
  document.getElementById("count").textContent = list.length + " CH";
}

function playStream(url, name, logo, updateRecent = true, showSpinner = true) {
  document.getElementById("now-playing-text").innerText = "দেখছেন: " + name;
  if (showSpinner) player.addClass('manual-loading');
  if (updateRecent) {
    recentChannels = recentChannels.filter(c => c.url !== url);
    recentChannels.unshift({name, url, logo});
    if (recentChannels.length > 8) recentChannels.pop();
    localStorage.setItem('recentCh', JSON.stringify(recentChannels));
    renderRecent();
  }
  player.src({ src: url, type: 'application/x-mpegURL' });
  player.play().catch(() => {});
}

function renderRecent() {
  const listEl = document.getElementById("recent-list");
  listEl.innerHTML = recentChannels.map(ch => `<div class="recent-item" onclick="playStream('${ch.url}', '${ch.name}', '${ch.logo}', true, true)">
    <img src="${ch.logo}">
  </div>`).join('');
}

function toggleFav(event, id) {
  event.stopPropagation();
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('myFavs', JSON.stringify(favorites));
  event.target.classList.toggle('active');
}

function shareApp() {
  if (navigator.share) navigator.share({ title: 'Avia Tv', url: window.location.href });
  else { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); }
}

init();
</script>

<script type="module">
